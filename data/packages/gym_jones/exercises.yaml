- id: kb_swing_breathing_ladder
  name: KB Swing Breathing Ladder (1-20-1)
  category: kettlebell
  modality:
  - strength_endurance
  - power
  equipment:
  - kettlebell
  effort: high
  bilateral: true
  movement_patterns:
  - hip_hinge
  - ballistic
  requires:
  - kb_swing_two_hand
  - bracing_mechanics
  unlocks: []
  contraindicated_with:
  - lumbar_disc_pathology
  progressions:
    load: increase_bell_weight
    volume: multiple_rounds
  scaling_down:
  - kb_swing_two_hand
  typical_volume:
    ladder_top: 20
    reps_total: 400
  sources:
  - Gym Jones
  notes: 'Gym Jones breathing ladder protocol: perform 1 KB swing, take 1 breath,
    perform 2 swings, take 2 breaths... climb to 20, then descend back to 1. Total:
    ~400 swings. The breathing is the rest — breath count equals rep count, enforcing
    complete oxygen recovery between sets. KB weight: 24 kg (53 lb) for trained athletes.
    The breathing ladder develops extraordinary KB endurance and trains the ability
    to recover during work. Mark Twight: "The breathing ladder is a test of will as
    much as fitness." Warm up with the same bell at lower rep counts before starting
    the full ladder.

    '
