    distance_m: 20
  sources:
  - Gym Jones
  notes: 'Quadruped locomotion — hips close to the ground, opposite limbs moving
    simultaneously. Gym Jones uses bear crawl in conditioning circuits and as a loaded
    carry accessory (DB bear crawl: hands on dumbbells, hop feet forward). Builds
    shoulder stability, hip flexor endurance, and total-body coordination. Weighted
    version: push DBs forward, hop feet up in plank position. Distance-based or time-based.

    '
