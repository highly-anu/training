id: block_periodization
name: Block Periodization
source_philosophy: gym_jones

goals_served:
  - max_strength
  - strength_endurance
  - power
  - mixed_modal_conditioning

sessions_per_week:
  max_strength: 2
  power: 1
  mixed_modal_conditioning: 2
  durability: 1
  aerobic_base: 1
modality_priority:
  committed: [max_strength]
  core: [mixed_modal_conditioning, power]
  supplementary: [durability, aerobic_base]

intensity_distribution:
  zone1_2_pct: 0.20
  zone3_pct: 0.15
  zone4_5_pct: 0.25
  max_effort_pct: 0.40

progression_model: volume_block

applicable_when:
  training_level:
    - intermediate
    - advanced
    - elite
  days_per_week_min: 4
  days_per_week_max: 6
  goal_priority_min:
    max_strength: 0.2

incompatible_with:
  - framework_id: linear_progression
    reason: >
      Block periodization assumes accumulated training history and deliberate phase
      shifts. Linear progression's session-by-session load increases are incompatible
      with block volume/intensity sequencing.
    interference_level: high
    mitigation: >
      Do not combine. Exhaust linear progression first, then transition to block work.
  - framework_id: rpe_autoregulation
    reason: >
      Block periodization uses pre-planned percentage-based loading within each phase.
      RPE autoregulation replaces prescribed percentages with feel-based load decisions,
      which undermines the structured volume-to-intensity progression of each block.
    interference_level: manageable
    mitigation: >
      Use RPE to fine-tune load within block targets (e.g. RPE 8 on the top set of a
      volume block). Do not use RPE to bypass block phase structure.

deload_protocol:
  frequency_weeks: 4
  volume_reduction_pct: 0.6
  intensity_change: maintain

# Hard/easy alternation — avoid back-to-back high-intensity sessions
cadence_options:
  3: [[1, 3, 5], [1, 3, 6], [2, 4, 6]]
  4: [[1, 2, 4, 6], [1, 3, 5, 7], [2, 3, 5, 7]]
  5: [[1, 2, 3, 5, 7], [1, 2, 4, 5, 7], [1, 3, 4, 6, 7]]

sources:
  - "Gym Jones — Operator Fitness I & II (Twight)"
  - "Gym Jones — Soldier of Steel"
  - "Horsemen Training Program 2008"
  - "Supertraining, Verkhoshansky"

notes: >
  Organizes training into sequential 4-6 week phases: Accumulation (high volume,
  moderate intensity) → Transmutation (moderate volume, higher intensity) → Realization
  (low volume, peak intensity/performance). Used by Gym Jones for operator fitness
  programming and by Horsemen across their 4-month macro (Month 1 Strength →
  Month 2 Power Endurance → Month 3 Job Specific → Month 4 Maintenance).
  Hard/easy day alternation is built into the weekly structure. Progression levers:
  reduce rest periods for bodyweight-based work; increase load for barbell/KB work —
  never both simultaneously (Twight rule).

expectations:
  min_weeks: 12
  ideal_weeks: 16
  min_days_per_week: 4
  ideal_days_per_week: 5
  min_session_minutes: 60
  ideal_session_minutes: 90
  ideal_long_session_minutes: 120
  supports_split_days: true
