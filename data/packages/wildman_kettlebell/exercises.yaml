  - Pavel
  notes: 'Two bells jerked simultaneously from double rack. Highest systemic demand
    of all KB pressing patterns. Demands exceptional breathing mechanics and core
    stability. KB pentathlon long cycle clean & jerk uses double bells.

    '
  starting_load_kg:
    novice: 16
    intermediate: 24
    advanced: 32
    elite: 40
