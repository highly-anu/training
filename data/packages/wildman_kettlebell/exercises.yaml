  name: Kettlebell Jerk (Double)
  category: kettlebell
  modality:
  - power
  - max_strength
  - anaerobic_intervals
  equipment:
  - kettlebell
  effort: max
  bilateral: true
  movement_patterns:
  - vertical_push
  - ballistic
  - olympic_lift
  requires:
