    volume: increase_rpm_target
  scaling_down:
  - kb_swing_single_arm
  - kb_clean_single
  typical_volume:
    sets: 3
    duration_sec: 180
  sources:
  - Wildman
  - Pavel
  - Horsemen
  notes: 'Bell punched from hip-hinge to overhead lockout in one movement. Horsemen
    12-min complex: 1 min snatch each arm. Horsemen SSST standard: 200+ snatches in
    10 min at 53# (Team Guy standard). KB pentathlon half-snatch: 108 reps in 6 min.
    KB sport RPM target: 14 RPM at 1 pood.

    '
  starting_load_kg:
    novice: 16
    intermediate: 24
    advanced: 32
    elite: 40
- id: kb_squat_double
  name: Kettlebell Double Front Squat
  category: kettlebell
  modality:
  - max_strength
  - strength_endurance
  equipment:
  - kettlebell
  effort: high
  bilateral: true
  movement_patterns:
  - squat
  requires:
  - kb_squat_goblet
  - kb_clean_double
  unlocks: []
  contraindicated_with:
