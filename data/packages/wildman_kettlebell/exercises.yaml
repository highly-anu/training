exercises:
- id: kb_swing_two_hand
  name: Kettlebell Swing (Two-Hand)
  category: kettlebell
  modality:
  - power
  - aerobic_base
  - strength_endurance
  equipment:
  - kettlebell
  effort: medium
  bilateral: true
  movement_patterns:
  - hip_hinge
  - ballistic
  requires:
  - hip_hinge
  - bracing_mechanics
  unlocks:
  - kb_swing_single_arm
  - kb_deadlift
  contraindicated_with:
  - lumbar_disc
  - hip_flexor_strain
  progressions:
    load: increase_bell_weight
    volume: increase_duration_or_reps
    complexity: kb_swing_single_arm
  scaling_down:
  - kb_deadlift
  typical_volume:
    sets: 3
    reps: 20
  sources:
  - Wildman
  - Pavel
  - Horsemen
  - Gym Jones
  notes: 'Foundational kettlebell ballistic. Hip-hinge driven; bell floats to shoulder
    height on the backswing hip snap. Horsemen warm-up complex: 1 min two-hand swings.
    Gym Jones breathing ladder uses swings 1–20 at 53#. Wildman progression begins
    here. Two hands on the bell; posterior-chain power driver.

    '
  starting_load_kg:
    novice: 16
    intermediate: 24
    advanced: 32
    elite: 40
- id: kb_swing_single_arm
  name: Kettlebell Swing (Single-Arm)
  category: kettlebell
  modality:
  - power
  - strength_endurance
  - aerobic_base
  equipment:
  - kettlebell
  effort: medium
  bilateral: false
  movement_patterns:
  - hip_hinge
  - ballistic
  requires:
  - kb_swing_two_hand
  unlocks:
  - kb_clean_single
  - kb_snatch
  contraindicated_with:
  - lumbar_disc
  - hip_flexor_strain
  - shoulder_instability
  progressions:
    load: increase_bell_weight
    volume: increase_duration_or_reps
    complexity: kb_clean_single
  scaling_down:
  - kb_swing_two_hand
  typical_volume:
    sets: 3
    reps: 15
  sources:
  - Wildman
  - Pavel
  - Horsemen
  notes: 'One hand on the bell; free hand assists with balance and counter-rotation.
    Horsemen warm-up complex: 1 min swings each arm (left then right). Direct prerequisite
    to single-arm clean and snatch. Anti-rotation demand is greater than two-hand
    swing.

    '
  starting_load_kg:
    novice: 12
    intermediate: 16
    advanced: 24
    elite: 32
- id: kb_clean_single
  name: Kettlebell Clean (Single-Arm)
  category: kettlebell
  modality:
  - power
  - strength_endurance
  equipment:
  - kettlebell
  effort: medium
  bilateral: false
  movement_patterns:
  - hip_hinge
  - olympic_lift
  - ballistic
  requires:
  - kb_swing_single_arm
  unlocks:
  - kb_clean_double
  - kb_press_single
  - kb_push_press_single
  - kb_jerk_single
  - kb_snatch
  contraindicated_with:
  - lumbar_disc
  - wrist_injury
  - hip_flexor_strain
  progressions:
    load: increase_bell_weight
    volume: increase_duration_or_reps
    complexity: kb_clean_double
  scaling_down:
  - kb_swing_single_arm
  typical_volume:
    sets: 3
    reps: 10
  sources:
  - Wildman
  - Pavel
  - Horsemen
  notes: 'Bell pulled from swing arc into rack position at shoulder. Elbow nestled
    against body; bell resting on forearm. Horsemen 12-min KB complex: 1 min clean
    & press each arm. Wildman progression: swing → clean → press → snatch.

    '
  starting_load_kg:
    novice: 12
    intermediate: 16
    advanced: 24
    elite: 32
- id: kb_clean_double
  name: Kettlebell Clean (Double)
  category: kettlebell
  modality:
  - power
  - strength_endurance
  - max_strength
  equipment:
  - kettlebell
  effort: high
  bilateral: true
  movement_patterns:
  - hip_hinge
  - olympic_lift
  - ballistic
  requires:
  - kb_clean_single
  unlocks:
  - kb_press_double
  - kb_squat_double
  contraindicated_with:
  - lumbar_disc
  - wrist_injury
  - hip_flexor_strain
  progressions:
    load: increase_bell_weight
    volume: increase_reps_per_set
    complexity: kb_jerk_double
  scaling_down:
  - kb_clean_single
  typical_volume:
    sets: 5
    reps: 5
  sources:
  - Wildman
  - Pavel
  notes: 'Two bells simultaneously cleaned to double rack position. Bilateral load
    significantly increases systemic demand. Prerequisite for all double-bell pressing
    and squatting patterns. Featured in kettlebell workout AMRAP cycles.

    '
  starting_load_kg:
    novice: 16
    intermediate: 24
    advanced: 32
    elite: 40
- id: kb_press_single
  name: Kettlebell Press (Single-Arm)
  category: kettlebell
  modality:
  - max_strength
  - relative_strength
  equipment:
  - kettlebell
  effort: medium
  bilateral: false
  movement_patterns:
  - vertical_push
  requires:
  - push_pattern
  - bracing_mechanics
  unlocks:
  - kb_press_double
  - kb_push_press_single
  - kb_overhead_carry
  contraindicated_with:
  - shoulder_impingement
  - shoulder_instability
  - wrist_injury
  progressions:
    load: increase_bell_weight
    volume: increase_reps_per_set
    complexity: kb_press_double
  scaling_down:
  - kb_clean_single
  typical_volume:
    sets: 3
    reps: 5
  sources:
  - Wildman
  - Pavel
  - Horsemen
  notes: 'Strict shoulder press from rack position. No leg drive. Horsemen 12-min
    warm-up complex uses clean & press 1 min each arm. Kettlebell workout cycles feature
    press in all three cycles. Requires tight lat engagement at lockout.

    '
  starting_load_kg:
    novice: 8
    intermediate: 12
    advanced: 16
    elite: 24
- id: kb_press_double
  name: Kettlebell Press (Double)
  category: kettlebell
  modality:
  - max_strength
  - relative_strength
  equipment:
  - kettlebell
  effort: high
  bilateral: true
  movement_patterns:
  - vertical_push
  requires:
  - kb_press_single
  - kb_clean_double
  unlocks: []
  contraindicated_with:
  - shoulder_impingement
  - shoulder_instability
  - wrist_injury
  - lumbar_disc
  progressions:
    load: increase_bell_weight
    volume: increase_reps_per_set
  scaling_down:
  - kb_press_single
  typical_volume:
    sets: 3
    reps: 5
  sources:
  - Wildman
  - Pavel
  notes: 'Both bells pressed from double rack simultaneously. Significantly higher
    systemic demand and core bracing requirement than single press. Cycle 1 in kettlebell
    workout schedule prominently features double KB push press and press at 2×16kg.

    '
  starting_load_kg:
    novice: 12
    intermediate: 16
    advanced: 24
    elite: 32
- id: kb_push_press_single
  name: Kettlebell Push Press (Single-Arm)
  category: kettlebell
  modality:
  - power
  - strength_endurance
  equipment:
  - kettlebell
  effort: medium
  bilateral: false
  movement_patterns:
  - vertical_push
  - ballistic
  requires:
  - kb_press_single
  - kb_clean_single
  unlocks:
  - kb_jerk_single
  contraindicated_with:
  - shoulder_impingement
  - shoulder_instability
  - wrist_injury
  - knee_meniscus_post_op
  progressions:
    load: increase_bell_weight
    volume: increase_duration
    complexity: kb_jerk_single
  scaling_down:
  - kb_press_single
  typical_volume:
    sets: 3
    duration_sec: 60
  sources:
  - Wildman
  - Horsemen
  notes: 'Hip dip drives bell off shoulder; arm locks out overhead. Horsemen warm-up
    protocol: 1 min push press each arm. KB workout standard warm-up cycle includes
    push press as timed interval. Bridge movement from strict press to jerk.

    '
  starting_load_kg:
    novice: 12
    intermediate: 16
    advanced: 24
    elite: 32
- id: kb_jerk_single
  name: Kettlebell Jerk (Single-Arm)
  category: kettlebell
  modality:
  - power
  - strength_endurance
  - anaerobic_intervals
  equipment:
  - kettlebell
  effort: high
  bilateral: false
  movement_patterns:
  - vertical_push
  - ballistic
  - olympic_lift
  requires:
  - kb_clean_single
  - kb_push_press_single
  unlocks:
  - kb_jerk_double
  contraindicated_with:
  - shoulder_impingement
  - shoulder_instability
  - wrist_injury
  - knee_meniscus_post_op
  - ankle_sprain
  progressions:
    load: increase_bell_weight
    volume: increase_rpm_target
    complexity: kb_jerk_double
  scaling_down:
  - kb_push_press_single
  typical_volume:
    sets: 4
    duration_sec: 120
  sources:
  - Wildman
  - Pavel
  notes: 'Double dip jerk: first dip drives bell overhead, second dip catches arm
    locked under bell. KB sport RPM target: 10 RPM at 1 pood (16kg). KB workout timed
    protocol: 8 min at 10 RPM, switching hands every 2 min. Primary KB pentathlon
    movement; 120 reps in 6 min (20 RPM) is the pentathlon standard.

    '
  starting_load_kg:
    novice: 12
    intermediate: 16
    advanced: 24
    elite: 32
