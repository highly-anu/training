  - hip_flexor_strain
  - wrist_injury
  progressions:
    load: increase_bell_weight
    volume: increase_reps_per_set
  scaling_down:
  - kb_squat_goblet
  typical_volume:
    sets: 5
    reps: 5
  sources:
  - Wildman
  - Pavel
  notes: 'Two bells held in rack position; front squat pattern. Anterior load demands
    significant thoracic extension and core bracing. More demanding than goblet squat;
    requires double clean to set up.

    '
  starting_load_kg:
    novice: 16
    intermediate: 24
    advanced: 32
    elite: 40
- id: kb_tgu
  name: Kettlebell Turkish Get-Up
  category: kettlebell
  modality:
  - movement_skill
  - durability
  - strength_endurance
  equipment:
  - kettlebell
  effort: medium
  bilateral: false
  movement_patterns:
  - vertical_push
  - rotation
  - isometric
  requires:
  - bracing_mechanics
  unlocks:
  - kb_overhead_carry
  - kb_rack_carry
  contraindicated_with:
  - shoulder_impingement
  - shoulder_instability
  - wrist_injury
  - neck_strain
  progressions:
    load: increase_bell_weight
    volume: increase_reps_per_side
  scaling_down:
  - kb_halo
  typical_volume:
    sets: 5
    reps: 2
  sources:
  - Gym Jones
  - Horsemen
  - Wildman
  notes: 'From lying to standing with bell locked overhead throughout; reverse to
    return. Foundational Wildman movement. Gym Jones programs 100 TGUs at 15# (recovery
    day) and 5–6 reps at 25# (strength day core work with 60-sec FLR). Horsemen
    SMMF: 100 get-ups at 35# KB (15–20 min). Unlocks all overhead carries. Tests
    shoulder stability, hip mobility, and whole-body integration.

    '
  starting_load_kg:
    novice: 8
    intermediate: 12
    advanced: 16
    elite: 24
- id: kb_deadlift
  name: Kettlebell Deadlift
  category: kettlebell
  modality:
  - max_strength
  - durability
  equipment:
  - kettlebell
  effort: low
  bilateral: true
  movement_patterns:
  - hip_hinge
  requires: []
  unlocks:
  - kb_swing_two_hand
  - kb_swing_single_arm
  contraindicated_with:
  - lumbar_disc
  - hip_flexor_strain
  progressions:
    load: increase_bell_weight
    volume: increase_reps_per_set
    complexity: kb_swing_two_hand
  scaling_down: []
  typical_volume:
    sets: 3
    reps: 10
  sources:
  - Wildman
  - Pavel
  notes: 'Hip-hinge pattern with kettlebell between feet, pulled to standing. No prerequisites
    beyond basic motor control; appropriate as the first movement taught. Scaling-down
    option for barbell deadlift. Direct gateway to swings; teaches the hip hinge without
    ballistic demand.

    '
  starting_load_kg:
    novice: 16
    intermediate: 24
    advanced: 32
    elite: 48
- id: kb_windmill
  name: Kettlebell Windmill
  category: kettlebell
  modality:
  - mobility
  - movement_skill
  - durability
  equipment:
  - kettlebell
  effort: low
  bilateral: false
  movement_patterns:
  - rotation
  - hip_hinge
  - vertical_push
  requires:
  - kb_tgu
  - kb_halo
  unlocks: []
  contraindicated_with:
  - shoulder_impingement
  - shoulder_instability
  - lumbar_disc
  - wrist_injury
  - hip_flexor_strain
  progressions:
    load: increase_bell_weight
    volume: increase_reps_per_side
  scaling_down:
  - kb_halo
  typical_volume:
    sets: 3
    reps: 5
  sources:
  - Wildman
  - Pavel
  notes: 'Bell locked overhead; athlete hinges laterally to touch floor with free
    hand, maintaining overhead lockout. Develops lateral hip mobility, shoulder stability
    under rotation, and hamstring length. One of the most demanding single-arm overhead
    stability exercises.

    '
  starting_load_kg:
    novice: 8
    intermediate: 12
    advanced: 16
    elite: 24
