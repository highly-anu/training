notes: 'Skill development session covering Wildman''s foundational movement vocabulary:
  halo, TGU, windmill, and carries. No set is performed while fatigued — quality is
  the only metric. Appropriate as a standalone session or as the opening block of
  any other session. Novices use this to develop the TGU before loading swings. Intermediate
  athletes add windmill and overhead carry. No RPM targets or time pressure; each
  rep is treated as a practice, not a performance.

