id: kb_double_strength
name: "Double KB Strength (Press / Squat / Hinge)"
modality: max_strength
category: kettlebell
duration_estimate_minutes: 60
required_equipment:
  - kettlebell
applicable_phases:
  - base
  - build
  - peak
  - maintenance
sources:
  - "Dan John"
  - "Pavel Tsatsouline"
  - "RKC"
notes: >
  Double kettlebell strength protocol built around the three fundamental patterns:
  press, squat, and hinge. Based on Dan John's Armor Building Formula and Pavel's
  double KB work. Unlike barbell strength programs, KB loads are limited by available
  bell increments — progression is slower and requires patience. The Turkish Get-Up
  serves as both warm-up and active skill work, building shoulder stability and hip
  mobility under load simultaneously.
  Load selection: heaviest pair that allows 5 clean, strong reps with no breakdown.
  Rest fully between sets (2–4 min) — this is a strength session, not conditioning.
  Session structure: TGU opener → double squat → double press → hinge → pull.

slots:
  - role: tgu_warmup
    slot_type: sets_reps
    sets: 3
    reps: 2
    intensity: moderate
    rest_sec: 60
    exercise_filter:
      movement_pattern: tgu
    notes: >
      3 × 2 Turkish Get-Up per side at a moderate bell. Focus on quality, not weight.
      Each rep = 1 full TGU (floor to stand and back). Activates glutes, stabilises
      shoulder girdle, and grooves hip hinge pattern before loading. ~10 min.

  - role: primary_lower
    slot_type: sets_reps
    sets: 5
    reps: 5
    intensity: heavy
    rest_sec: 240
    exercise_filter:
      movement_pattern: squat
      category: kettlebell
    notes: >
      Double KB front squat or goblet squat. Heaviest available pair.
      Full depth, torso upright, elbows inside knees. KB at chest height (goblet)
      or rack position (double). This is the limiting movement — load accordingly.
      Double KB front squat is preferred over goblet when two matched bells are available.

  - role: primary_press
    slot_type: sets_reps
    sets: 5
    reps: 5
    intensity: heavy
    rest_sec: 240
    exercise_filter:
      movement_pattern: vertical_push
      category: kettlebell
    notes: >
      Double KB military press. Strict lockout, packed scapulae, ribs down.
      Heavier than goblet squat typically — use same pair as squat or one step up.
      If double KB is not available: single-arm alternating press, 5 per side per set.
      Avoid push press here — this slot trains strict shoulder strength.

  - role: primary_hinge
    slot_type: sets_reps
    sets: 5
    reps: 5
    intensity: heavy
    rest_sec: 240
    exercise_filter:
      movement_pattern: hinge
      category: kettlebell
      exclude_movement_pattern: ballistic
    notes: >
      KB deadlift — single or double bell. Controlled descent, full hip extension at top.
      Not swings: this slot is for slow, loaded hinge strength, not power.
      Use heaviest available single bell or matched pair.
      Double KB deadlift can be loaded heavier than single; prefer double when available.

  - role: accessory_pull
    slot_type: sets_reps
    sets: 3
    reps: "6-8"
    intensity: moderate
    rest_sec: 90
    exercise_filter:
      movement_pattern: pull
    notes: >
      KB row (single arm) or pull-up. Balances the pressing volume.
      Single-arm KB row: brace from hip, full retraction at top. 6-8 per side.
      Pull-up: add weight if bodyweight is easy. Strict movement, full hang to chin over bar.

scaling:
  deload:
    volume_multiplier: 0.6
    intensity_pct: 0.9
    notes: "Reduce to 3×5 at 90% of working load. Drop TGU to 2×2. Keep all three main patterns."
  time_limited:
    drop_slots:
      - tgu_warmup
      - accessory_pull
    notes: "Drop TGU warm-up and accessory pull. Run all three main patterns for 3 sets only (~30 min)."
  equipment_limited:
    substitutions:
      - missing_equipment: kettlebell
        substitute_approach: "Use dumbbells for all slots. DB goblet squat, DB press, DB Romanian deadlift, DB row. Turkish Get-Up with DB is workable; use lighter load and prioritise shoulder stability."
