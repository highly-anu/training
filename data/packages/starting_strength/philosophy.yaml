id: starting_strength
name: "Starting Strength / Mark Rippetoe"
core_principles:
  - linear_progression_is_fastest_novice_path
  - barbell_compound_lifts_are_primary_stress_stimulus
  - stress_recovery_adaptation_cycle
  - squat_is_proxy_for_overall_development
  - add_weight_every_session_until_stalled
  - form_mastery_before_load_increase
scope:
  - max_strength
  - relative_strength
  - power
bias:
  - max_strength
avoid_with:
  - aerobic_base
  - mixed_modal_conditioning
  - strength_endurance
required_equipment:
  - barbell
  - rack
  - plates
intensity_model: linear_progression
progression_philosophy: load_based
sources:
  - "Starting Strength: Basic Barbell Training (Rippetoe, 3rd ed.)"
  - "data/crossfit/crossfit journal/ — Rippetoe squatting article (2006)"
notes: >
  Strictly a novice-to-early-intermediate barbell methodology. Not designed for
  concurrent training; Rippetoe explicitly argues against mixing heavy conditioning
  with linear progression due to recovery interference. Scope limited to strength
  domains — this philosophy has no conditioning prescription beyond "don't do much."
  Novice completion benchmarks: squat 1.5× BW, deadlift 2× BW, press 0.75× BW.
