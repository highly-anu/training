id: linear_progression
name: Linear Progression (SS)
source_philosophy: starting_strength

goals_served:
  - max_strength

sessions_per_week:
  max_strength: 3
modality_priority:
  committed: [max_strength]
  core: []
  supplementary: []

intensity_distribution:
  zone1_2_pct: 0.0
  zone3_pct: 0.0
  zone4_5_pct: 0.0
  max_effort_pct: 1.0

progression_model: linear_load

applicable_when:
  training_level:
    - novice
  days_per_week_min: 3
  days_per_week_max: 4
  goal_priority_min:
    max_strength: 0.3

incompatible_with:
  - framework_id: polarized_80_20
    reason: >
      High-frequency barbell loading requires full systemic recovery between sessions.
      Adding aerobic volume competes for recovery resources and blunts strength adaptation.
    interference_level: manageable
    mitigation: >
      Cap conditioning at 2 sessions/week, Zone 1-2 only. Schedule aerobic sessions on
      off-days or post-strength as cool-down. Do not run concurrent polarized volume phases.
  - framework_id: emom_amrap
    reason: >
      EMOM/AMRAP conditioning elevates systemic fatigue and undermines session-to-session
      load progression that linear progression depends on.
    interference_level: high
    mitigation: >
      If conditioning is required, limit to 1 short EMOM session/week on a non-strength day.
      Reduce to 10-15 min max duration. Accept slower strength progress.
  - framework_id: block_periodization
    reason: >
      Block periodization is designed for intermediate/advanced trainees. Combining it with
      linear progression is redundant and disruptive — linear progression should run to
      failure before transitioning to block work.
    interference_level: high
    mitigation: >
      Do not combine. Run linear progression to stall, then transition to block periodization.

deload_protocol:
  frequency_weeks: 4
  volume_reduction_pct: 0.6
  intensity_change: maintain

# Classic alternating rest — Mon/Wed/Fri and shifted variants
cadence_options:
  2: [[1, 4], [2, 5], [1, 5]]
  3: [[1, 3, 5], [2, 4, 6], [1, 3, 6]]
  4: [[1, 2, 4, 6], [1, 3, 4, 6], [2, 3, 5, 7]]

sources:
  - "Starting Strength, Mark Rippetoe (3rd ed.)"
  - "Practical Programming for Strength Training, Rippetoe & Kilgore"

notes: >
  The canonical novice protocol. Three full-body sessions per week (Mon/Wed/Fri or
  equivalent). Each session adds weight to the bar — typically 5 lb/session on squat
  and deadlift, 2.5 lb on press. The squat is performed every session. Session
  structure: Squat 3×5, Press or Bench 3×5 (alternating), Deadlift 1×5. Run until
  linear gains stall (3 consecutive sessions without progress on a lift), then
  transition to intermediate programming. Conditioning is minimized or eliminated
  during this phase to preserve recovery capacity.

expectations:
  min_weeks: 8
  ideal_weeks: 12
  min_days_per_week: 3
  ideal_days_per_week: 3
  min_session_minutes: 45
  ideal_session_minutes: 75
  supports_split_days: false
