- id: box_squat
  name: Box Squat
  category: barbell
  modality:
  - max_strength
  - strength_endurance
  equipment:
  - barbell
  - rack
  - plates
  - box
  effort: medium
  bilateral: true
  movement_patterns:
  - squat
  - hip_hinge
  requires:
  - back_squat
  unlocks: []
  contraindicated_with:
  - knee_meniscus_post_op
  - hip_flexor_strain
  progressions:
    load: add_2.5_5kg_per_session
    volume: add_sets
  scaling_down:
  - back_squat
  typical_volume:
    sets: 5
    reps: 2
  sources:
  - Starting Strength
  notes: 'Posterior-chain emphasis squat variant. Pausing on box removes stretch reflex
    and increases demand on hip extensors. Useful for athletes with poor squat depth
    mechanics or as powerlifting variation.

    '
- id: deadlift
  name: Deadlift
  category: barbell
  modality:
  - max_strength
  - relative_strength
  equipment:
  - barbell
  - plates
  effort: high
  bilateral: true
  movement_patterns:
  - hip_hinge
  requires:
  - bracing_mechanics
  unlocks:
  - romanian_deadlift
  - sumo_deadlift
  - deficit_deadlift
  - power_clean
  - barbell_row
  - pendlay_row
  - good_morning
  contraindicated_with:
  - lumbar_disc
  - hip_flexor_strain
  progressions:
    load: add_5kg_per_session_novice
    volume: progress_1x5_to_3x3
    complexity: sumo_deadlift
  scaling_down:
  - kb_deadlift
  - romanian_deadlift
  typical_volume:
    sets: 1
    reps: 5
  sources:
  - Starting Strength
  - Horsemen
  - Gym Jones
  notes: 'Horsemen standard: 2.5×BW deadlift. Starting Strength programs 1×5 as
    novice primary. Gym Jones tests 1RM and builds training percentages from it (80%
    common). King of posterior-chain loading; prerequisite for all Olympic lifting
    derivatives.

    '
  starting_load_kg:
    novice: 50
    intermediate: 90
    advanced: 130
    elite: 170
  weekly_increment_kg: 5.0
- id: romanian_deadlift
  name: Romanian Deadlift
  category: barbell
  modality:
  - max_strength
  - durability
  equipment:
  - barbell
  - plates
  effort: medium
  bilateral: true
  movement_patterns:
  - hip_hinge
  requires:
  - deadlift
  unlocks:
  - good_morning
  contraindicated_with:
  - lumbar_disc
  - hip_flexor_strain
  progressions:
    load: add_5kg_per_session
    volume: add_sets
  scaling_down:
  - kb_deadlift
  typical_volume:
    sets: 3
    reps: 8
  sources:
  - Starting Strength
  - Gym Jones
  notes: 'Gym Jones programs SLDL (stiff-leg DL / RDL) at 95–135# for 3×10 in Accumulation
    sessions. Emphasizes hamstring length and posterior-chain resilience. Hip hingeing
    with a neutral spine under load; bar remains close to legs.

    '
  starting_load_kg:
    novice: 40
    intermediate: 75
    advanced: 110
    elite: 140
  weekly_increment_kg: 2.5
