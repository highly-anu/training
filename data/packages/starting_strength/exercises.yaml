  - hip_flexor_strain
  - neck_strain
  progressions:
    load: add_2.5_5kg_per_session
    volume: add_sets
  scaling_down:
  - romanian_deadlift
  typical_volume:
    sets: 3
    reps: 10
  sources:
  - Starting Strength
  notes: 'Bar on upper traps, hinge forward until torso is roughly parallel to floor,
    return to standing. Develops hamstring and spinal erector strength in a lengthened
    position. Starting Strength programs as posterior-chain accessory. Moderate loads
    for high reps; not a max-effort movement.

    '
