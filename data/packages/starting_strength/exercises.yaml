    load: add_2.5kg_per_session
    volume: add_sets
  scaling_down:
  - bench_press
  - floor_press
  typical_volume:
    sets: 3
    reps: 6
  sources:
  - Starting Strength
  notes: 'Grip inside shoulder width, elbows tucked. Shifts demand toward triceps
    and medial deltoid. Used as tricep-dominant pressing accessory. Grip narrower
    than shoulder-width but not so narrow as to cause wrist deviation.

    '
