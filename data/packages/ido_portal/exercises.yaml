    complexity: hip_90_90_with_transition
  scaling_down:
  - hip_circle
  typical_volume:
    sets: 2
    duration_sec: 60
  sources:
  - Ido Portal
  notes: Seated with both hips at 90 degrees — one internally rotated, one externally
    rotated. Addresses both internal and external hip rotation. Transition between
    sides is itself a mobility drill. Hold or apply gentle oscillating pressure.
- id: hip_flexor_stretch
  name: Hip Flexor Stretch (kneeling)
  category: mobility
  modality:
  - mobility
  equipment:
  - none
  effort: low
  bilateral: false
  movement_patterns:
  - hip_flexion
  requires: []
