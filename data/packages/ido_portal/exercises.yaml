  contraindicated_with:
  - wrist_injury
  progressions:
    volume: increase_duration
    complexity: l_sit
  scaling_down: []
  typical_volume:
    sets: 4
    duration_sec: 15
  sources:
  - Ido Portal
  notes: 'Knees tucked to chest in supported hold. Regression of L-sit. Develops scapular
    depression strength and hip flexor compression. Ido Portal prescribes as a daily
    practice movement.

    '
- id: pistol_squat
  name: Pistol Squat (Single-Leg Squat)
  category: bodyweight
  modality:
  - relative_strength
  - movement_skill
  equipment:
  - none
  effort: high
  bilateral: false
  movement_patterns:
  - squat
  requires:
  - squat_air
  - single_leg_balance
  unlocks: []
  contraindicated_with:
  - knee_meniscus_post_op
  - patellar_tendinopathy
  progressions:
    volume: increase_reps_per_set
    load: add_weight_vest
  scaling_down:
  - squat_air
  typical_volume:
    sets: 3
    reps: 5
  sources:
  - CrossFit
  - Ido Portal
  notes: 'Single-leg squat to full depth with opposite leg extended forward. High
    demand on hip flexor strength and ankle dorsiflexion mobility. Gym Jones single-leg
    squat on 18–20" box is the primary regression.

    '
- id: hip_circle
  name: Hip Circle
  category: mobility
  modality:
  - mobility
  equipment:
  - none
  effort: low
  bilateral: true
  movement_patterns:
