  scaling_down:
  - shoulder_circle
  - band_pull_apart
  typical_volume:
    sets: 2
    reps: 10
  sources:
  - Ido Portal
  notes: Wide-grip PVC pass from front to overhead to behind back and return. Progressively
    narrow grip as shoulder mobility improves. Contraindicated with shoulder instability
    (hypermobility) or wrist pathology. Use resistance band as regression if PVC feels
    binding.
- id: band_pull_apart
  name: Band Pull-Apart
  category: mobility
  modality:
