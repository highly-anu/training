exercises:
- id: push_up_ring
  name: Push-Up (Rings)
  category: bodyweight
  modality:
  - relative_strength
  - movement_skill
  equipment:
  - rings
  effort: high
  bilateral: true
  movement_patterns:
  - horizontal_push
  requires:
  - push_up
  unlocks:
  - muscle_up_ring
  contraindicated_with:
  - wrist_injury
  - shoulder_impingement
  - shoulder_instability
  progressions:
    volume: increase_reps_per_set
    complexity: muscle_up_ring
  scaling_down:
  - push_up
  typical_volume:
    sets: 3
    reps: 10
  sources:
  - CrossFit
  - Ido Portal
  notes: 'Rings demand active shoulder stabilization throughout the press. Turn rings
    out at lockout (RTO). Significant recruitment of pec minor, serratus anterior,
    and rotator cuff relative to bar push-up.

    '
- id: push_up_archer
  name: Push-Up (Archer)
  category: bodyweight
  modality:
  - relative_strength
  equipment:
  - none
  effort: high
  bilateral: false
  movement_patterns:
  - horizontal_push
  requires:
  - push_up
  unlocks:
  - pistol_squat
  contraindicated_with:
  - wrist_injury
  - shoulder_impingement
  progressions:
    volume: increase_reps_per_set
    complexity: push_up_ring
  scaling_down:
  - push_up
  typical_volume:
    sets: 3
    reps: 5
  sources:
  - Ido Portal
  notes: 'Unilateral loading progression toward one-arm push-up. Wide stance; working
    arm bends fully, assisting arm extends laterally with minimal weight-bearing.
    Each side trained independently.

    '
- id: pull_up_ring
  name: Pull-Up (Rings)
  category: bodyweight
  modality:
  - relative_strength
  - movement_skill
  equipment:
  - rings
  effort: high
  bilateral: true
  movement_patterns:
  - vertical_pull
  requires:
  - pull_up
  unlocks:
  - muscle_up_ring
  contraindicated_with:
  - shoulder_instability
  - shoulder_impingement
  progressions:
    volume: increase_reps_per_set
    complexity: muscle_up_ring
  scaling_down:
  - pull_up
  typical_volume:
    sets: 4
    reps: 5
  sources:
  - CrossFit
  - Ido Portal
  notes: 'Rings allow natural rotation of the forearm throughout the pull. Higher
    stabiliser demand than bar. Turn rings out at the top for full shoulder pack.
    Prerequisite for ring muscle-up.

    '
- id: handstand_hold
  name: Handstand Hold (Wall)
  category: bodyweight
  modality:
  - relative_strength
  - movement_skill
  equipment:
  - none
  effort: medium
  bilateral: true
  movement_patterns:
  - vertical_push
  - isometric
  requires:
  - wrist_prep
  - shoulder_stability
  unlocks:
  - handstand_push_up
  contraindicated_with:
  - wrist_injury
  - shoulder_impingement
  progressions:
    volume: increase_duration
    complexity: handstand_push_up
  scaling_down: []
  typical_volume:
    sets: 3
    duration_sec: 30
  sources:
  - CrossFit
  - Ido Portal
  notes: 'Chest-to-wall or back-to-wall hold. Active shoulders — push floor away,
    protract scapulae. Foundation for HSPU. Ido Portal treats inversion practice as
    a daily movement habit.

    '
- id: handstand_push_up_ring
  name: Handstand Push-Up (Rings)
  category: bodyweight
  modality:
  - relative_strength
  - max_strength
  - movement_skill
  equipment:
  - rings
  effort: max
  bilateral: true
  movement_patterns:
  - vertical_push
  requires:
  - handstand_push_up
  - dip_ring
  unlocks: []
  contraindicated_with:
  - wrist_injury
  - shoulder_impingement
  - shoulder_instability
  progressions:
    volume: increase_reps_per_set
  scaling_down:
  - handstand_push_up
  typical_volume:
    sets: 3
    reps: 3
  sources:
  - Ido Portal
  notes: 'Extreme stability demand. Rings set low; athlete kicks to inverted and controls
    descent onto rings. Requires total shoulder stability and considerable proprioception.
    Ido Portal advanced ring work.

    '
- id: l_sit
  name: L-Sit (Parallettes or Floor)
  category: bodyweight
  modality:
  - relative_strength
  - movement_skill
  equipment:
  - parallettes
  effort: high
  bilateral: true
  movement_patterns:
  - isometric
  - hip_flexion
  requires:
  - sit_up
  - tuck_sit
  unlocks: []
  contraindicated_with:
  - wrist_injury
  - hip_flexor_strain
  progressions:
    volume: increase_duration
  scaling_down:
  - tuck_sit
  typical_volume:
    sets: 4
    duration_sec: 10
  sources:
  - CrossFit
  - Ido Portal
  notes: 'Full hip flexion hold with straight legs, locked elbows, depressed scapulae.
    Accumulate time in hold; 60 sec total volume is a reasonable benchmark. Ido Portal
    uses as baseline compression strength indicator.

    '
- id: tuck_sit
  name: Tuck Sit (Parallettes or Floor)
  category: bodyweight
  modality:
  - relative_strength
  - movement_skill
  equipment:
  - parallettes
  effort: medium
  bilateral: true
  movement_patterns:
  - isometric
  requires: []
  unlocks:
