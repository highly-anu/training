  progressions:
    volume: increase_duration
  scaling_down:
  - hip_90_90
  typical_volume:
    sets: 2
    duration_sec: 90
  sources:
  - Ido Portal
  notes: External hip rotation stretch targeting piriformis and external rotators.
    Can be performed supine (figure-4) for those with knee discomfort. Contraindicated
    with acute meniscus injury due to knee flexion under hip rotation load.
