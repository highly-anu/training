  scaling_down:
  - thoracic_rotation
  typical_volume:
    sets: 2
    duration_sec: 60
  sources:
  - Horsemen
  - Ido Portal
  notes: Foam roller placed perpendicular to spine at mid-back. Segment-by-segment
    extension over roller. Avoid rolling lumbar spine directly. Contraindicated with
    active lumbar disc pathology due to spinal extension load.
- id: shoulder_circle
  name: Shoulder Circle
  category: mobility
