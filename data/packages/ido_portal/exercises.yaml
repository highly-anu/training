  notes: Wrist circumduction in both directions. Part of Ido Portal wrist prep routine.
    Perform before any load-bearing hand position (push-ups, handstands, kettlebell
    work).
- id: wrist_flexion_stretch
  name: Wrist Flexion Stretch
  category: mobility
