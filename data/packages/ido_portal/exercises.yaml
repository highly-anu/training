  - Horsemen
  notes: Standing hip circumduction — large circles in both directions. Standard
    joint prep for any lower body session. Low threshold entry movement for hip mobility
    warm-up sequences.
- id: hip_90_90
  name: Hip 90/90 Stretch
  category: mobility
  modality:
  - mobility
  equipment:
  - none
  effort: low
  bilateral: false
  movement_patterns:
