  contraindicated_with: []
  progressions:
    volume: increase_duration
    complexity: couch_stretch
  scaling_down: []
  typical_volume:
    sets: 2
    duration_sec: 60
  sources:
  - Horsemen
  - Ido Portal
  notes: Half-kneeling lunge position, drive hips forward to load iliopsoas. Posterior
    pelvic tilt cue to deepen stretch. Essential counter to prolonged sitting and
    heavy squat/deadlift days.
- id: pigeon_pose
  name: Pigeon Pose
  category: mobility
  modality:
  - mobility
  equipment:
