    duration_sec: 30
  sources:
  - Ido Portal
  notes: Extend arm forward, pull fingers back toward body to stretch wrist flexors.
    Part of Ido Portal wrist routine. Contraindicated with acute wrist injury.
- id: wrist_extension_stretch
  name: Wrist Extension Stretch
  category: mobility
  modality:
  - mobility
  equipment:
