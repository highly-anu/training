  scaling_down: []
  typical_volume:
    sets: 3
    reps: 20
  sources:
  - Horsemen
  - Ido Portal
  notes: Horizontal band pull-apart at chest height or overhead. Activates posterior
    deltoid, infraspinatus, and lower trapezius. Critical for shoulder health maintenance.
    Prehab staple for any pressing-heavy program.
