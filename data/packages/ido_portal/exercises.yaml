  notes: Standing arm circles in both directions at varied speeds. Standard shoulder
    joint prep before any upper body or overhead work. Both forward and backward directions
    required.
- id: shoulder_dislocate_pvc
  name: Shoulder Dislocate (PVC pipe)
  category: mobility
  modality:
  - mobility
  equipment:
