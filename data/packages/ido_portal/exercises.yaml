    duration_sec: 30
  sources:
  - Ido Portal
  notes: Point fingers down and press back of hand away to stretch wrist extensors.
    Counterbalances flexion stretch. Use floor press (quadruped wrist mobility) as
    loaded variant.
- id: squat_clinic
  name: Ido Portal Squat Clinic Routine
  category: mobility
  modality:
  - mobility
  equipment:
  - none
  effort: low
  bilateral: true
  movement_patterns:
  - squat
  - hip_flexion
  requires: []
  unlocks: []
  contraindicated_with: []
  progressions:
    volume: increase_duration
  scaling_down:
  - ankle_calf_stretch
  - hip_flexor_stretch
  typical_volume:
    sets: 1
    duration_sec: 300
  sources:
  - Ido Portal
  notes: Ido Portal's standardized squat mobility sequence — includes deep squat
    hold, weight shift, heel raises, internal/external rotation exploration, and ankle
    mobilization. Performed as one continuous set at session start. Duration 3-5 min.
    Part of the standard Floreio warm-up.
- id: scapula_mobilization
  name: Scapula Mobilization
  category: mobility
  modality:
  - mobility
  equipment:
  - none
  effort: low
  bilateral: true
  movement_patterns: []
  requires: []
  unlocks: []
  contraindicated_with: []
  progressions:
    volume: increase_duration
  scaling_down:
  - shoulder_circle
  typical_volume:
    sets: 3
    duration_sec: 60
  sources:
  - Ido Portal
  notes: Scapular protraction/retraction, depression/elevation, and circumduction.
    Listed in Ido Portal's cool-down (3 sets, 60-sec rest). Addresses scapulohumeral
    rhythm restrictions. Perform as cool-down staple after any overhead or pushing
    session.
- id: couch_stretch
  name: Couch Stretch (hip flexor/quad)
  category: mobility
  modality:
  - mobility
  equipment:
  - none
  effort: low
  bilateral: false
  movement_patterns:
  - hip_flexion
  - knee_extension
  requires:
  - hip_flexor_stretch
  unlocks: []
  contraindicated_with:
  - knee_meniscus_acute
  - patellar_tendinopathy_acute
  progressions:
    volume: increase_duration
  scaling_down:
  - hip_flexor_stretch
  typical_volume:
    sets: 2
    duration_sec: 120
  sources:
  - Horsemen
  - Ido Portal
  notes: Rear foot elevated against wall, knee on floor, hip driven toward wall. Targets
    rectus femoris and hip flexor complex simultaneously. One of the most effective
    hip extension mobility drills. Contraindicated with acute knee conditions due
    to end-range knee flexion load.
- id: role_basic
  name: Basic Roll (Corta Capim / Role)
  category: skill
  modality:
  - movement_skill
  equipment:
  - open_space
  effort: low
  bilateral: true
  movement_patterns:
  - locomotion
  requires: []
  unlocks:
  - au_cortado
  - cartwheel
  contraindicated_with:
  - cervical_spine_injury
  - shoulder_instability
  progressions:
    volume: increase_duration
    complexity: au_cortado
  scaling_down: []
  typical_volume:
    sets: 3
    duration_sec: 120
  sources:
  - Ido Portal
  notes: Ido Portal corta capim / role work — continuous rolling patterns on the
    floor. Entry to all floreio ground work. 2-5 min continuous practice with 30-sec
    rest. Advanced variants include improvisation of learned movements. Contraindicated
    with cervical spine injury due to neck loading in rolls.
- id: au_cortado
  name: Au Cortado (Capoeira Cartwheel Variation)
  category: skill
  modality:
  - movement_skill
  equipment:
  - open_space
  effort: medium
  bilateral: false
  movement_patterns:
  - ballistic
  - locomotion
  requires:
  - role_basic
  - bridge_low
  unlocks:
  - au_cortado_press
  - floreio_sequence
  contraindicated_with:
  - shoulder_instability
  - wrist_injury
  progressions:
    volume: increase_reps_per_set
    complexity: au_cortado_press
  scaling_down:
  - role_basic
  - cartwheel
  typical_volume:
    sets: 3
    reps: 12
  sources:
  - Ido Portal
  notes: 'Capoeira-derived cartwheel-like movement — lateral hand-to-floor transition
    with inversion. Requires simultaneous bridge mobility and role foundation. Intermediate
    floreio element. Ido Portal programs 10-14 reps per set with 60-sec rest. Progression:
    Half Au Cortado → Au Cortado → Au Cortado Press.'
- id: bridge_low
  name: Low Bridge (Rotations Into Low Bridge)
  category: skill
  modality:
  - movement_skill
  equipment:
  - open_space
  effort: low
  bilateral: true
  movement_patterns:
  - isometric
  requires: []
  unlocks:
  - bridge_high
  - au_cortado
  - bridge_walk
  contraindicated_with:
  - lumbar_disc
  - shoulder_instability
  progressions:
    volume: increase_reps_per_set
    complexity: bridge_high
  scaling_down: []
  typical_volume:
    sets: 3
    reps: 10
  sources:
  - Ido Portal
  notes: Ground-level bridge from supine — low backbend with weight on hands and
    feet, hips low. Multiple difficulty levels of approach. Ido Portal programs 10
    reps rotating into bridge. Slide into low bridge variant uses 5 reps × 5-sec
    hold. Foundation for all Floreio arch work.
- id: bridge_high
  name: High Bridge (Full Backbend)
  category: skill
  modality:
  - movement_skill
  equipment:
  - open_space
  effort: medium
  bilateral: true
  movement_patterns:
  - isometric
  - vertical_push
  requires:
  - bridge_low
  unlocks:
  - bridge_walk
  - floreio_sequence
  contraindicated_with:
  - lumbar_disc
  - shoulder_impingement
  - shoulder_instability
  progressions:
    volume: increase_duration
    complexity: bridge_walk
  scaling_down:
  - bridge_low
  typical_volume:
    sets: 3
    duration_sec: 30
  sources:
  - Ido Portal
  notes: Full wheel / gymnastic bridge — hips driven high, arms and legs extended.
    Must master low bridge first. Static hold 30 sec (can be broken into attempts).
    Requires wrist, shoulder, thoracic, and hip flexor mobility simultaneously. Ido
    Portal programs rotations into high bridge (10 reps) and static high bridge hold
    (30 sec) as separate drill.
- id: bridge_walk
  name: Bridge Walk (Front or Back)
  category: skill
  modality:
  - movement_skill
  equipment:
  - open_space
  effort: medium
  bilateral: true
  movement_patterns:
  - locomotion
  - isometric
  requires:
  - bridge_high
  unlocks:
  - floreio_sequence
  contraindicated_with:
  - lumbar_disc
  - shoulder_impingement
  - shoulder_instability
  progressions:
    volume: increase_duration
    complexity: floreio_sequence
  scaling_down:
  - bridge_high
  typical_volume:
    sets: 3
    distance_m: 12
  sources:
  - Ido Portal
  notes: Locomotion in bridge position — front bridge walking (12m intermediate)
    or back bridge walking (15m advanced). Part of Ido Portal locomotion circuit programmed
    3-5 rounds. Beginner variant is static hold 30 sec. Demands sustained spinal extension,
    shoulder stability, and hip flexor length under load.
