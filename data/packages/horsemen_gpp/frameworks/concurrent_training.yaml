id: concurrent_training
name: Concurrent Training (GPP / Balanced Fitness)
source_philosophy: horsemen_gpp

goals_served:
  - max_strength
  - aerobic_base
  - mixed_modal_conditioning
  - durability
  - strength_endurance

sessions_per_week:
  max_strength: 2
  aerobic_base: 2
  mixed_modal_conditioning: 1
  durability: 1
  strength_endurance: 1
modality_priority:
  committed: [max_strength, aerobic_base]
  core: [mixed_modal_conditioning, durability]
  supplementary: [strength_endurance]

intensity_distribution:
  zone1_2_pct: 0.30
  zone3_pct: 0.15
  zone4_5_pct: 0.25
  max_effort_pct: 0.30

progression_model: rpe_autoregulation

applicable_when:
  training_level:
    - intermediate
    - advanced
    - elite
  days_per_week_min: 4
  days_per_week_max: 6
  goal_priority_min:
    aerobic_base: 0.15

incompatible_with:
  - framework_id: linear_progression
    reason: >
      Concurrent training's conditioning volume and fatigue accumulation prevents
      the session-to-session recovery that linear progression requires. The
      interference effect is well-documented: endurance work blunts strength
      adaptation when both are pursued at full volume.
    interference_level: high
    mitigation: >
      If a novice needs both, run a minimal linear progression (3×/week barbell)
      and strictly cap conditioning at 2 low-intensity sessions/week. Accept slower
      strength gains. Transition to true concurrent programming once linear progress
      stalls.
  - framework_id: high_frequency_skill
    reason: >
      Adding daily skill sessions on top of a full concurrent training week creates
      excessive total training volume and degrades movement quality — the opposite
      of what high-frequency skill work is designed to achieve.
    interference_level: manageable
    mitigation: >
      Replace one conditioning session with a skill session, or limit skill practice
      to 10-15 min movement prep before existing sessions rather than standalone
      daily sessions.

deload_protocol:
  frequency_weeks: 4
  volume_reduction_pct: 0.60
  intensity_change: reduce_slightly

# Index 0 = most spread-out (used for taper/deload); others are 2-on-1-off variants
cadence_options:
  3: [[1, 4, 7], [1, 3, 6], [2, 4, 7]]
  4: [[1, 3, 5, 7], [1, 2, 4, 6], [2, 3, 5, 7]]
  5: [[1, 2, 4, 6, 7], [1, 2, 4, 5, 7], [1, 3, 4, 6, 7]]
  6: [[1, 2, 3, 5, 6, 7], [1, 2, 4, 5, 6, 7]]

sources:
  - "Horsemen Training Program 2008"
  - "Gym Jones — Operator Fitness I & II (Twight)"
  - "Concurrent Training: A Meta-Analysis, Wilson et al."
  - "Uphill Athlete — Concurrent supplementary strength protocols"

notes: >
  Concurrent training alternates strength and conditioning sessions within the same
  week. The primary challenge is interference: endurance adaptations (mitochondrial
  biogenesis, slow-twitch hypertrophy) can blunt strength/power adaptations when
  both are maximally pursued. Fatigue management is the governing concern, not
  progressive overload on any single quality. Goal priority weighting drives session
  allocation: a goal profile with aerobic_base 0.5 + max_strength 0.2 allocates
  more session slots and total weekly volume to aerobic work. Horsemen 4-day template
  (Mon strength, Tue conditioning, Thu carries + bodyweight, Sat long ruck/GPP) is
  a canonical implementation. RPE autoregulation governs load daily to account for
  accumulated fatigue across modalities.

expectations:
  min_weeks: 12
  ideal_weeks: 16
  min_days_per_week: 4
  ideal_days_per_week: 5
  min_session_minutes: 60
  ideal_session_minutes: 90
  ideal_long_session_minutes: 120
  supports_split_days: true
