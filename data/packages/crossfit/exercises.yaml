    sets: 4
    duration_sec: 480
  sources:
  - Gym Jones
  - CrossFit Endurance
  notes: 'Gym Jones: 6× 500m at ~15 sec per 500m slower than PR pace, 3-min active
    rest between pieces (1:2 work:rest). CrossFit Endurance threshold row format mirrors
    run threshold protocol. Stroke rate 24–28 SPM.

    '
- id: row_500m_test
  name: 500m Row Time Trial
  category: aerobic
  modality:
  - anaerobic_intervals
  - mixed_modal_conditioning
  equipment:
  - rower
  effort: max
  bilateral: true
  movement_patterns:
  - aerobic_monostructural
  requires:
  - row_interval
  unlocks: []
  contraindicated_with:
  - lumbar_disc_pathology
  progressions:
    volume: add_sets
  scaling_down:
  - row_interval
  typical_volume:
    sets: 1
    distance_m: 500
  sources:
  - Gym Jones
  - CrossFit
  notes: 'Gym Jones benchmark: establish 500m PR pace; all interval training references
    this pace. CrossFit benchmark Jackie includes 1000m row. All-out effort; use as
    test 1–2× per training block, not as regular conditioning stimulus.

    '
- id: bike_easy
  name: Easy Bike (Zone 1–2)
  category: aerobic
  modality:
  - aerobic_base
  equipment:
