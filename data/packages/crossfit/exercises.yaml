  - achilles_tendinopathy
  - knee_meniscus_post_op
  progressions:
    volume: increase_duration
    complexity: jump_rope_double_under
  scaling_down: []
  typical_volume:
    duration_sec: 300
  sources:
  - CrossFit
  notes: 'Foundation jump rope skill. Light impact; builds rhythm and coordination
    prerequisite for double unders. CrossFit bodyweight WODs use single unders as
    the accessible scaling option. 1 double under = 3 single unders in most scaling
    schemes.

    '
- id: jump_rope_double_under
  name: Jump Rope (Double Under)
  category: aerobic
  modality:
  - anaerobic_intervals
  - movement_skill
  equipment:
  - jump_rope
  effort: medium
  bilateral: true
  movement_patterns:
  - aerobic_monostructural
  - locomotion
  - ballistic
  requires:
  - jump_rope_single_under
  unlocks: []
  contraindicated_with:
  - ankle_sprain
  - achilles_tendinopathy
  - knee_meniscus_post_op
  progressions:
    volume: increase_reps_per_set
  scaling_down:
  - jump_rope_single_under
  typical_volume:
    sets: 5
    reps: 50
  sources:
  - CrossFit
  notes: 'Rope passes twice per jump. CrossFit benchmark Annie: 50-40-30-20-10 double
    unders alternated with sit-ups. Requires rope speed, timing, and consistent jump
    height. Higher cardiovascular demand than single unders. Wrist mechanics and rope
    length are the primary limiting factors for beginners.

    '
