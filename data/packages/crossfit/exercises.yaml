  - Gym Jones
  notes: 'Foundation horizontal push. Cue: full lockout at top, chest to floor at
    bottom, elbows at 45 degrees. Scale up via ring, archer, or clapping variants.
    Gym Jones programs 200+ reps in Murph-style sessions.

    '
