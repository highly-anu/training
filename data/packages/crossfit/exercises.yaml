    duration_sec: 20
  sources:
  - CrossFit Endurance
  notes: 'Tabata-protocol intervals or longer threshold intervals on bike. Assault
    bike commonly used for mixed-modal conditioning (e.g., Echo bike calories). Low
    injury risk relative to running intervals; useful when running is contraindicated.

    '
- id: ski_erg_easy
