  - CrossFit
  notes: 'Concept II rower rated highest for metabolic conditioning by CrossFit Journal.
    Gym Jones recovery day format A: 60–120 min easy row at conversational pace.
    Damper setting 4–6 for most athletes. Stroke rate 18–22 SPM at recovery pace.

    '
