  notes: 'Pronated grip, full hang to chin over bar. Gym Jones programs pull-up ladders
    (1-2-3-4-5-6 per set) accumulating 50+ reps. CrossFit benchmark Murph: 100 reps.
    Prerequisite dead_hang ensures shoulder stability under passive load before active
    pulling.

    '
- id: chin_up
