  typical_volume:
    sets: 8
    duration_sec: 20
  sources:
  - CrossFit Endurance
  notes: 'Tabata or 30/15-format intervals. High metabolic demand; upper-body fatigue
    accumulates quickly. Useful mixed-modal conditioning variation when rowing and
    running are both programmed in the same week.

    '
- id: jump_rope_single_under
  name: Jump Rope (Single Under)
  category: aerobic
  modality:
  - aerobic_base
  - movement_skill
  equipment:
  - jump_rope
  effort: low
  bilateral: true
  movement_patterns:
