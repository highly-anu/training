  - shoulder_impingement
  - lumbar_disc_pathology
  progressions:
    volume: increase_duration
  scaling_down: []
  typical_volume:
    duration_sec: 2400
  sources:
  - CrossFit Endurance
  notes: 'Double-pole motion on Concept II SkiErg. Predominantly upper-body and core-driven
    aerobic demand; lower-limb contribution from hip hinge. Useful for aerobic base
    when running is contraindicated. Low stroke rate at Zone 1–2.

    '
