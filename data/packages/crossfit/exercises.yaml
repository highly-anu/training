  unlocks:
  - run_sprint
  contraindicated_with:
  - ankle_sprain
  - achilles_tendinopathy
  - patellar_tendinopathy
  - knee_meniscus_post_op
  progressions:
    volume: add_sets
  scaling_down:
  - run_tempo
  typical_volume:
    sets: 6
    distance_m: 400
  sources:
  - CrossFit Endurance
  - Gym Jones
  notes: 'Gym Jones: 5× 1-min all-out, 4-min active recovery; or 4× 800 yards at
    10% faster than 2-mile PR pace. CrossFit Endurance pyramid intervals: 1-2-3-4-3-2-1
    min at Zone 3–4. Work:rest ratio typically 1:2 to 1:4.

    '
- id: run_sprint
  name: Sprint Run (Max Effort)
  category: aerobic
  modality:
  - anaerobic_intervals
  - power
  equipment:
  - open_space
  effort: max
  bilateral: true
  movement_patterns:
  - aerobic_monostructural
  - locomotion
  - ballistic
  requires:
  - run_interval
  unlocks: []
  contraindicated_with:
  - ankle_sprain
  - achilles_tendinopathy
  - patellar_tendinopathy
  - knee_meniscus_post_op
  - hamstring_strain
  progressions:
    volume: add_sets
  scaling_down:
  - run_interval
  typical_volume:
    sets: 6
    distance_m: 50
  sources:
  - CrossFit Endurance
  - Gym Jones
  notes: 'Flat-out maximal effort, ≤60 sec duration per rep. Gym Jones 3-mile time
    trial is the primary run performance test. Sprint work builds top-end speed and
    anaerobic capacity. Full warm-up mandatory; do not programme on days following
    high lower-body strength volume.

    '
- id: row_easy
  name: Easy Row (Zone 1–2)
  category: aerobic
  modality:
  - aerobic_base
  equipment:
  - rower
  effort: low
  bilateral: true
