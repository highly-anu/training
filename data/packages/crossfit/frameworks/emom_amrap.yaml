id: emom_amrap
name: EMOM / AMRAP Conditioning
source_philosophy: crossfit

goals_served:
  - mixed_modal_conditioning
  - strength_endurance
  - anaerobic_intervals
  - power

sessions_per_week:
  mixed_modal_conditioning: 3
  strength_endurance: 1
modality_priority:
  committed: [mixed_modal_conditioning]
  core: [strength_endurance]
  supplementary: []

intensity_distribution:
  zone1_2_pct: 0.05
  zone3_pct: 0.30
  zone4_5_pct: 0.50
  max_effort_pct: 0.15

progression_model: density

applicable_when:
  training_level:
    - novice
    - intermediate
    - advanced
    - elite
  days_per_week_min: 2
  days_per_week_max: 5
  goal_priority_min:
    mixed_modal_conditioning: 0.25

incompatible_with:
  - framework_id: linear_progression
    reason: >
      Frequent high-intensity conditioning sessions accumulate systemic fatigue
      that prevents the recovery required for session-to-session load increases.
      More than 2 EMOM/AMRAP sessions per week will stall or reverse linear
      strength progression.
    interference_level: high
    mitigation: >
      Limit to 1 short conditioning session per week (under 15 min, lower intensity).
      Schedule on a day between strength sessions, never the day before a heavy
      barbell day. Accept that linear strength progression will slow.
  - framework_id: polarized_80_20
    reason: >
      EMOM/AMRAP work predominantly sits in Zone 3-4 ("moderate intensity danger
      zone" in polarized theory), which accumulates fatigue without contributing
      to aerobic base development. Substituting Zone 1-2 sessions with EMOM work
      violates the 80% low-intensity rule.
    interference_level: manageable
    mitigation: >
      Treat EMOM/AMRAP sessions as the 20% high-intensity allocation only. Do not
      add EMOM work on top of the polarized interval quota. Total high-intensity
      sessions remain capped at 20% of weekly volume.

# High-intensity format — needs recovery day between sessions
cadence_options:
  2: [[1, 4], [1, 5], [2, 5]]
  3: [[1, 3, 5], [2, 4, 6], [1, 4, 6]]
  4: [[1, 3, 5, 7], [1, 2, 5, 7], [2, 3, 5, 7]]
  5: [[1, 2, 4, 6, 7], [1, 3, 4, 6, 7]]

sources:
  - "CrossFit Training Guide (Glassman)"
  - "CrossFit Endurance methodology"
  - "Horsemen Training Program 2008 — Density/EMOM workouts"
  - "Gym Jones — Accumulation Day protocols"

notes: >
  EMOM (Every Minute On the Minute) and AMRAP (As Many Rounds/Reps As Possible)
  are session formats, not standalone periodization systems. As a framework, they
  represent a conditioning-dominant programming approach where the session structure
  itself is the progression vehicle: same movements in less time (AMRAP), or
  maintaining output across all intervals (EMOM). Density progression means the
  athlete's ability to complete more work within the fixed time domain. EMOM format
  can be applied to strength movements (EMOM strength waves: 10×1 at 85-95%) or
  pure conditioning (Horsemen "Purple Church": 10 min EMOM, 3 power clean + 3 hang
  squat clean + 3 push press). AMRAP format (CrossFit metcons, Horsemen "PBR":
  AMRAP 20 min) targets mixed-modal work capacity. Can be used as a standalone
  conditioning framework or as conditioning days within a concurrent training block.

expectations:
  min_weeks: 8
  ideal_weeks: 12
  min_days_per_week: 3
  ideal_days_per_week: 4
  min_session_minutes: 45
  ideal_session_minutes: 60
  supports_split_days: false
