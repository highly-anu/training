exercises:
  - id: zone2_hike
    name: "Zone 2 Hike"
    category: aerobic
    modality:
      - aerobic_base
      - durability
    equipment:
      - open_space
    effort: medium
    bilateral: true
    movement_patterns:
      - locomotion
      - aerobic_monostructural
    typical_volume:
      duration_sec: 7200
    notes: "Sustained uphill hiking at HR below AeT. Nose-breathing pace."

  - id: recovery_jog_easy
    name: "Easy Recovery Jog"
    category: aerobic
    modality:
      - aerobic_base
    equipment:
      - open_space
    effort: low
    bilateral: true
    movement_patterns:
      - locomotion
      - aerobic_monostructural
    typical_volume:
      duration_sec: 2400
    notes: "Strict Z1, well below AeT. Walking permitted."

  - id: weighted_ruck_walk
    name: "Weighted Ruck Walk"
    category: loaded_carry
    modality:
      - aerobic_base
      - strength_endurance
      - durability
    equipment:
      - ruck_pack
      - open_space
    effort: medium
    bilateral: true
    movement_patterns:
      - loaded_carry
      - locomotion
    typical_volume:
      duration_sec: 6000
    notes: "Pack 10–30% bodyweight depending on phase. Uphill terrain preferred."

  - id: uphill_run
    name: "Uphill Run"
    category: aerobic
    modality:
      - aerobic_base
      - anaerobic_intervals
    equipment:
      - open_space
    effort: medium
    bilateral: true
    movement_patterns:
      - locomotion
      - aerobic_monostructural
    typical_volume:
      duration_sec: 1800
    notes: "Used for Z2 progressions and AnT intervals on grade."

  - id: hill_repeat
    name: "Steep Hill Repeat"
    category: aerobic
    modality:
      - anaerobic_intervals
    equipment:
      - open_space
    effort: high
    bilateral: true
    movement_patterns:
      - locomotion
      - aerobic_monostructural
    typical_volume:
      duration_sec: 180
    notes: "2–4 min hard uphill rep, walk down recovery."

  - id: weighted_box_step_up
    name: "Weighted Box Step-Up"
    category: loaded_carry
    modality:
      - strength_endurance
    equipment:
      - ruck_pack
      - box
    effort: high
    bilateral: false
    movement_patterns:
      - step_up
      - knee_extension
      - hip_flexion
    typical_volume:
      duration_sec: 1800
    notes: "16–20 in box. Pack 20–35% bodyweight. Continuous, alternating legs. The signature ME workout."

  - id: uphill_weighted_carry_ex
    name: "Uphill Weighted Carry"
    category: loaded_carry
    modality:
      - strength_endurance
      - durability
    equipment:
      - ruck_pack
      - open_space
    effort: high
    bilateral: true
    movement_patterns:
      - loaded_carry
      - locomotion
    typical_volume:
      duration_sec: 5400
    notes: "Outdoor analog of step-ups. Sustained steep grade, objective pack weight."

  - id: weighted_pull_up
    name: "Weighted Pull-Up"
    category: bodyweight
    modality:
      - max_strength
      - relative_strength
    equipment:
      - pull_up_bar
    effort: high
    bilateral: true
    movement_patterns:
      - vertical_pull
    typical_volume:
      reps: 5
    notes: "Upper body pulling strength for ice tools, scrambling."

  - id: plank
    name: "Front Plank"
    category: bodyweight
    modality:
      - max_strength
    equipment:
      - none
    effort: medium
    bilateral: true
    movement_patterns:
      - isometric
    typical_volume:
      duration_sec: 60
    notes: "Anti-extension core."

  - id: single_leg_rdl
    name: "Single-Leg RDL"
    category: bodyweight
    modality:
      - durability
      - mobility
    equipment:
      - none
    effort: low
    bilateral: false
    movement_patterns:
      - hip_hinge
    typical_volume:
      reps: 10
    notes: "Posterior chain, balance, hip stability — pre-hab staple."

  - id: eccentric_step_down
    name: "Eccentric Step-Down"
    category: bodyweight
    modality:
      - durability
      - rehab
    equipment:
      - box
    effort: low
    bilateral: false
    movement_patterns:
      - knee_extension
      - step_up
    typical_volume:
      reps: 10
    notes: "Slow eccentric (3–5 sec) off a box. Knee/quad durability for descents."

  - id: hip_flexor_mobilization
    name: "Half-Kneeling Hip Flexor Mobilization"
    category: mobility
    modality:
      - mobility
    equipment:
      - none
    effort: low
    bilateral: false
    movement_patterns:
      - isometric
    typical_volume:
      duration_sec: 90

  - id: thoracic_extension
    name: "Thoracic Extension over Foam Roller"
    category: mobility
    modality:
      - mobility
    equipment:
      - none
    effort: low
    bilateral: true
    movement_patterns:
      - isometric
    typical_volume:
      duration_sec: 120
    notes: "Counters pack-induced kyphosis."

  - id: ankle_dorsiflexion_drill
    name: "Ankle Dorsiflexion Drill"
    category: mobility
    modality:
      - mobility
    equipment:
      - none
    effort: low
    bilateral: false
    movement_patterns:
      - isometric
    typical_volume:
      duration_sec: 60
    notes: "Critical for steep uphill and downhill loading."
