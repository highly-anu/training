id: uphill_athlete
name: "Uphill Athlete / Steve House & Scott Johnston"
core_principles:
  - aerobic_base_is_foundation_of_mountain_performance
  - polarized_intensity_80pct_easy_20pct_hard
  - strength_is_supplementary_not_dominant
  - sport_specific_load_matters_more_than_gym_prs
  - periodization_orients_toward_objective_date
  - aerobic_threshold_self_test_governs_zone_boundaries
  - volume_before_intensity_in_base_phase
scope:
  - aerobic_base
  - anaerobic_intervals
  - max_strength
  - durability
bias:
  - aerobic_base
  - durability
avoid_with:
  - max_strength
  - mixed_modal_conditioning
required_equipment:
  - ruck_pack
intensity_model: polarized_80_20
progression_philosophy: volume_based
sources:
  - "Training for the New Alpinism (House & Johnston, 2014)"
  - "Uphill Athlete website — training methodology articles"
notes: >
  Designed for alpinism, ski mountaineering, and mountain endurance events.
  Zone boundaries set by individual aerobic threshold (AeT) test, not generic
  HR formulas. Strength work (max strength, core) is prescribed in small doses
  to support movement efficiency on terrain. Periodization is goal-date-anchored:
  base → build → peak → taper. Intensity split shifts progressively from 90/10
  in base toward 80/20 in build. Ruck pack is required for specificity; open
  terrain is the primary training environment.
