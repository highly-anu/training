notes: 'THE signature Uphill Athlete session. Weighted ruck step-ups on a

  16–20" box. Start: 20% bodyweight × 30 min continuous. Progress weekly

  by 5 min and/or 5% bodyweight, target endpoint 30–35% bodyweight

  × 60 min continuous (advanced). Pace is steady, not fast — the legs

  should be deeply fatigued at the end, lungs only mildly stressed.

  HR usually mid-Z2 to low-Z3. The point is local muscular fatigue,

  not aerobic stress. Once a week in Base, twice in Specific.

  '
