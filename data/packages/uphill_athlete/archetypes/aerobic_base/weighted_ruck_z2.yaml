notes: 'Aerobic volume with mountain-specific load. Pack weight starts at ~10%

  bodyweight in early Base and progresses toward objective pack weight

  through Specific. Terrain should include sustained climbs. Strict Z2 —

  if pack weight pushes HR into Z3, reduce load or slow down. Builds the

  postural-and-aerobic capacity to carry weight all day.

  '
