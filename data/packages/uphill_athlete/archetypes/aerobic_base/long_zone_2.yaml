notes: 'The cornerstone aerobic session. Strict Z1–Z2 (HR below AeT, conversational

  pace, nose-breathing should be possible throughout). Hiking, easy

  trail-running, ski-touring, cycling — modality matches sport. Duration

  starts at the athlete''s current sustainable long day and progresses

  toward the duration of the target objective during the Base phase.

  Refuel during the session for anything over 90 minutes.

  '
