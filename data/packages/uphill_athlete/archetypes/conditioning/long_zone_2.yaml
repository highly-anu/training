id: long_zone_2
name: "Long Zone 2 Aerobic Base"
modality: aerobic_base
category: conditioning
duration_estimate_minutes: 90
required_equipment: []
applicable_phases:
  - base
  - build
  - peak
  - taper
  - maintenance
sources:
  - "Uphill Athlete"
  - "CrossFit Endurance"
notes: >
  Steady-state aerobic session at Zone 2 intensity (below aerobic threshold, AeT).
  Heart rate target: AeT or lower — typically 130–140 bpm for trained athletes,
  often 120–135 bpm for base-phase novice. The nasal-breathing test is a practical
  proxy: if you cannot breathe comfortably through the nose, you are above Z2.
  Duration range 60–180 min depending on phase and goal. Uphill Athlete prescribes
  80% of weekly training volume at Z1/Z2. Modality is flexible: run, ruck, cycle,
  ski, row, hike with elevation. Sport-specific modality preferred when goal is
  mountain or endurance performance. No pauses; continuous effort.

slots:
  - role: aerobic_base_work
    slot_type: time_domain
    duration_sec: 5400
    intensity: zone2
    exercise_filter:
      category: aerobic
    notes: >
      Default 90-minute Z2 effort. Adjust duration_sec at generation time per
      phase prescription: base phase 60–90 min, build phase 90–150 min, long
      session day up to 180 min. Athlete should be able to hold a conversation.
      Modality priority: run > ruck > cycle > row when sport-specific for mountain.

scaling:
  deload:
    volume_multiplier: 0.6
    intensity_pct: 0.9
    notes: "Reduce duration by 40% (e.g. 90 min → 55 min). Intensity stays the same or slightly lower."
  time_limited:
    drop_slots: []
    notes: "Shorten the single continuous slot. Minimum effective dose ~40 min. Below 30 min, substitute a different conditioning archetype."
  equipment_limited:
    substitutions:
      - missing_equipment: rower
        substitute_approach: "Substitute cycling, running, or hiking. Any continuous aerobic modality qualifies for Zone 2 work."
