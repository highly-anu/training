id: threshold_intervals
name: "Threshold Intervals (3–5 × 8 min Zone 4)"
modality: anaerobic_intervals
category: conditioning
duration_estimate_minutes: 75
required_equipment: []
applicable_phases:
  - base
  - build
  - peak
sources:
  - "Uphill Athlete"
  - "CrossFit Endurance"
  - "Gym Jones"
notes: >
  Lactate-threshold intervals at Zone 4 intensity (~LT2, ~85–92% HRmax). Typical
  prescription: 3–5 repeats of 8 minutes at sustained hard effort, separated by
  active recovery at Zone 1–2. This is the 20% high-intensity portion of the Uphill
  Athlete polarized model. Adaptation target is raising the lactate threshold (the
  highest power/pace sustainable for ~40–60 min). Monostructural modalities preferred
  (run, bike, row, ski erg) for clean intensity control. Effort should feel like
  "comfortably hard" — sustainable within each interval but difficult to complete
  more than 5 repeats. Do not use this archetype more than 2× per week.

slots:
  - role: activation_ramp
    slot_type: time_domain
    duration_sec: 900
    intensity: zone2
    exercise_filter:
      category: aerobic
    notes: "15-min progressive warm-up. Start at Z1, build to Z2 by the end. Include 2 short 20-sec pickups to Z4 pace in the final 3 minutes."

  - role: threshold_interval
    slot_type: emom
    sets: 4
    duration_sec: 480
    intensity: zone4
    exercise_filter:
      category: aerobic
    notes: >
      Default 4 repeats of 8 min. Adjust sets to 3 in early build phase or when
      athlete is fatigued; push to 5 in late build / early peak. Rest between
      intervals: 3–4 min active recovery at Z1. If using a rower, target within
      10 sec of 2000m race pace split. If running, target roughly 10K race pace.

  - role: cool_down
    slot_type: time_domain
    duration_sec: 600
    intensity: zone1
    exercise_filter:
      category: aerobic
    notes: "10-min easy cool-down. Flush lactate. Optional light stretching."

scaling:
  deload:
    volume_multiplier: 0.6
    intensity_pct: 0.9
    notes: "Reduce to 2 intervals at 90% of target pace/power. Deload weeks should bias toward Zone 2; remove this archetype entirely if fatigue is high."
  time_limited:
    drop_slots:
      - cool_down
    notes: "Shorten or drop cool-down. Can reduce warm-up to 8 min. Do not reduce number of work intervals below 3."
  equipment_limited:
    substitutions:
      - missing_equipment: rower
        substitute_approach: "Run or cycle at equivalent perceived effort. Zone 4 by heart rate is the controlling variable, not the modality."
      - missing_equipment: bike
        substitute_approach: "Substitute running or rowing at same heart-rate zone."
