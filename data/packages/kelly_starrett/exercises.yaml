# ─── Breathing / bracing ──────────────────────────────────────────────────────
- id: diaphragmatic_breathing_360_ks
  name: Diaphragmatic Breathing — 360 Expansion
  category: mobility
  modality:
  - mobility
  - rehab
  equipment:
  - none
  effort: low
  bilateral: true
  movement_patterns:
  - isometric
  requires: []
  unlocks: []
  contraindicated_with: []
  progressions:
    volume: add_breath_cycles
  scaling_down: []
  typical_volume:
    sets: 1
    reps: 5
  sources:
  - Kelly Starrett — Becoming a Supple Leopard
  - MobilityWOD
  notes: '5 slow breaths expanding the rib cage forward, sideways, and backward
    simultaneously (360 expansion). Not chest-breathing. Then brace without
    holding the breath — create intra-abdominal pressure (IAP) by contracting
    the trunk while continuing to breathe. Athletes who cannot brace with
    neutral spine substitute with lumbar flexion or breath-holding, both of
    which are injury mechanisms. This is a skill requiring deliberate daily
    practice to become automatic.'
