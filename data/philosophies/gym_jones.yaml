id: gym_jones
name: "Gym Jones / Mark Twight"
core_principles:
  - mind_is_primary_limiter
  - work_tolerance_is_most_trainable_characteristic
  - horsepower_over_appearance
  - fit_for_whatever_comes_next_not_peaked_in_one_domain
  - maintain_60_to_70_pct_across_all_fitness_domains
  - hard_day_followed_by_recovery_day
  - general_fitness_before_sport_specific
  - no_shortcuts
  - power_endurance_and_strength_endurance_over_max_strength
  - reduce_rest_periods_or_increase_weight_not_both_simultaneously
scope:
  - max_strength
  - strength_endurance
  - aerobic_base
  - anaerobic_intervals
  - mixed_modal_conditioning
  - power
  - durability
bias:
  - strength_endurance
  - mixed_modal_conditioning
  - durability
avoid_with:
  - starting_strength
  - uphill_athlete
required_equipment:
  - barbell
  - plates
  - kettlebell
  - dumbbell
  - pull_up_bar
  - rower
  - box
  - medicine_ball
intensity_model: hard_easy_alternation
progression_philosophy: volume_based
sources:
  - "data/gym jones/operator fitness I.pdf"
  - "data/gym jones/operator fitness II.pdf"
  - "data/gym jones/soldier of steel.pdf"
notes: >
  Six-day week: 3 key sessions (strength, circuit, accumulation), 2 recovery
  sessions, 1 long endurance, 1 full rest. Intensity model is hard/easy alternation
  — not polarized (no 80/20 split), but structured hard-day/recovery-day cycling.
  Progression levers are deliberate: reduce rest (bodyweight work) OR increase load
  (barbell/KB), never both simultaneously. Excessive max strength / max speed
  development is explicitly de-emphasized; power-endurance and strength-endurance
  are the primary targets. Operator context: relative strength + aerobic capacity +
  mental durability. Programs are 1-month blocks, repeatable 2–3× or cycled
  between Operator I / Operator II.
