        II:  { female_kg: 10, male_kg: 16, reps: 50,  time_min: 5 }
        III: { female_kg: 12, male_kg: 20, reps: 75,  time_min: 5 }
        IV:  { female_kg: 16, male_kg: 24, reps: 100, time_min: 5 }
        V:   { female_kg: 16, male_kg: 24, reps: 200, time_min: 10 }

    kb_clean_and_jerk:
      description: "KB clean & jerk for reps in time"
      levels:
        I:   { female_kg: 8,  male_kg: 12, volume: "25 reps each side", time_min: 5 }
        II:  { female_kg: 10, male_kg: 16, volume: "25 reps double KB",  time_min: 5 }
        III: { female_kg: 12, male_kg: 20, volume: "50 reps double KB",  time_min: 5 }
        IV:  { female_kg: 16, male_kg: 24, volume: "75 reps double KB",  time_min: 10 }
        V:   { female_kg: 20, male_kg: 32, volume: "60 reps double KB",  time_min: 10 }

    thruster:
      description: "Barbell thruster for reps"
      levels:
        I:   { female_bw_pct: 0.25, male_bw_pct: 0.35, reps: 15 }
        II:  { female_bw_pct: 0.30, male_bw_pct: 0.40, reps: 21 }
        III: { female_bw_pct: 0.40, male_bw_pct: 0.50, reps: 21 }
        IV:  { female_bw_pct: 0.50, male_bw_pct: 0.60, reps: 21 }
        V:   { female_bw_pct: 0.60, male_bw_pct: 0.70, reps: 30 }

  endurance:
