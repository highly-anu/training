        III: { scaling: "As Rx'd", time: "Sub 60 min" }
        IV:  { scaling: "As Rx'd", time: "Sub 50 min" }
        V:   { scaling: "As Rx'd", time: "Sub 40 min" }

    fran:
      description: "21-15-9 thrusters + pull-ups"
      levels:
        III: { female_time: "6:30", male_time: "5:30" }

    fight_gone_bad:
      description: "3 rounds 1-min AMRAP: wall ball, SDHP, box jump, push press, row"
      levels:
        IV: { female_score: 325, male_score: 350, note: "points (reps total)" }
