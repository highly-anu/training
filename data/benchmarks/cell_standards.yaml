      description: "500m row best effort"
      levels:
        I:   { female_time: "2:25", male_time: "2:10" }
        II:  { female_time: "2:15", male_time: "1:50" }
        III: { female_time: "2:02", male_time: "1:40" }
        IV:  { female_time: "1:53", male_time: "1:35" }
        V:   { female_time: "1:46", male_time: "1:28" }

    row_1km:
      description: "1km row best effort"
      levels:
        I:   { female_time: "5:10", male_time: "4:40" }
