exercises:

  - id: kb_swing_two_hand
    name: Kettlebell Swing (Two-Hand)
    category: kettlebell
    modality:
      - power
      - aerobic_base
      - strength_endurance
    equipment:
      - kettlebell
    effort: medium
    bilateral: true
    movement_patterns:
      - hip_hinge
      - ballistic
    requires:
      - hip_hinge
      - bracing_mechanics
    unlocks:
      - kb_swing_single_arm
      - kb_deadlift
    contraindicated_with:
      - lumbar_disc
      - hip_flexor_strain
    progressions:
      load: increase_bell_weight
      volume: increase_duration_or_reps
      complexity: kb_swing_single_arm
    scaling_down:
      - kb_deadlift
    typical_volume:
      sets: 3
      reps: 20
    sources:
      - Wildman
      - Pavel
      - Horsemen
      - Gym Jones
    notes: >
      Foundational kettlebell ballistic. Hip-hinge driven; bell floats to shoulder
      height on the backswing hip snap. Horsemen warm-up complex: 1 min two-hand swings.
      Gym Jones breathing ladder uses swings 1–20 at 53#. Wildman progression begins here.
      Two hands on the bell; posterior-chain power driver.

  - id: kb_swing_single_arm
    name: Kettlebell Swing (Single-Arm)
    category: kettlebell
    modality:
      - power
      - strength_endurance
      - aerobic_base
    equipment:
      - kettlebell
    effort: medium
    bilateral: false
    movement_patterns:
      - hip_hinge
      - ballistic
    requires:
      - kb_swing_two_hand
    unlocks:
      - kb_clean_single
      - kb_snatch
    contraindicated_with:
      - lumbar_disc
      - hip_flexor_strain
      - shoulder_instability
    progressions:
      load: increase_bell_weight
      volume: increase_duration_or_reps
      complexity: kb_clean_single
    scaling_down:
      - kb_swing_two_hand
    typical_volume:
      sets: 3
      reps: 15
    sources:
      - Wildman
      - Pavel
      - Horsemen
    notes: >
      One hand on the bell; free hand assists with balance and counter-rotation.
      Horsemen warm-up complex: 1 min swings each arm (left then right).
      Direct prerequisite to single-arm clean and snatch. Anti-rotation demand
      is greater than two-hand swing.

  - id: kb_clean_single
    name: Kettlebell Clean (Single-Arm)
    category: kettlebell
    modality:
      - power
      - strength_endurance
    equipment:
      - kettlebell
    effort: medium
    bilateral: false
    movement_patterns:
      - hip_hinge
      - olympic_lift
      - ballistic
    requires:
      - kb_swing_single_arm
    unlocks:
      - kb_clean_double
      - kb_press_single
      - kb_push_press_single
      - kb_jerk_single
      - kb_snatch
    contraindicated_with:
      - lumbar_disc
      - wrist_injury
      - hip_flexor_strain
    progressions:
      load: increase_bell_weight
      volume: increase_duration_or_reps
      complexity: kb_clean_double
    scaling_down:
      - kb_swing_single_arm
    typical_volume:
      sets: 3
      reps: 10
    sources:
      - Wildman
      - Pavel
      - Horsemen
    notes: >
      Bell pulled from swing arc into rack position at shoulder. Elbow nestled against
      body; bell resting on forearm. Horsemen 12-min KB complex: 1 min clean & press
      each arm. Wildman progression: swing → clean → press → snatch.

  - id: kb_clean_double
    name: Kettlebell Clean (Double)
    category: kettlebell
    modality:
      - power
      - strength_endurance
      - max_strength
    equipment:
      - kettlebell
    effort: high
    bilateral: true
    movement_patterns:
      - hip_hinge
      - olympic_lift
      - ballistic
    requires:
      - kb_clean_single
    unlocks:
      - kb_press_double
      - kb_squat_double
    contraindicated_with:
      - lumbar_disc
      - wrist_injury
      - hip_flexor_strain
    progressions:
      load: increase_bell_weight
      volume: increase_reps_per_set
      complexity: kb_jerk_double
    scaling_down:
      - kb_clean_single
    typical_volume:
      sets: 5
      reps: 5
    sources:
      - Wildman
      - Pavel
    notes: >
      Two bells simultaneously cleaned to double rack position. Bilateral load
      significantly increases systemic demand. Prerequisite for all double-bell
      pressing and squatting patterns. Featured in kettlebell workout AMRAP cycles.

  - id: kb_press_single
    name: Kettlebell Press (Single-Arm)
    category: kettlebell
    modality:
      - max_strength
      - relative_strength
    equipment:
      - kettlebell
    effort: medium
    bilateral: false
    movement_patterns:
      - vertical_push
    requires:
      - push_pattern
      - bracing_mechanics
    unlocks:
      - kb_press_double
      - kb_push_press_single
      - kb_overhead_carry
    contraindicated_with:
      - shoulder_impingement
      - shoulder_instability
      - wrist_injury
    progressions:
      load: increase_bell_weight
      volume: increase_reps_per_set
      complexity: kb_press_double
    scaling_down:
      - kb_clean_single
    typical_volume:
      sets: 3
      reps: 5
    sources:
      - Wildman
      - Pavel
      - Horsemen
    notes: >
      Strict shoulder press from rack position. No leg drive. Horsemen 12-min warm-up
      complex uses clean & press 1 min each arm. Kettlebell workout cycles feature
      press in all three cycles. Requires tight lat engagement at lockout.

  - id: kb_press_double
    name: Kettlebell Press (Double)
    category: kettlebell
    modality:
      - max_strength
      - relative_strength
    equipment:
      - kettlebell
    effort: high
    bilateral: true
    movement_patterns:
      - vertical_push
    requires:
      - kb_press_single
      - kb_clean_double
    unlocks: []
    contraindicated_with:
      - shoulder_impingement
      - shoulder_instability
      - wrist_injury
      - lumbar_disc
    progressions:
      load: increase_bell_weight
      volume: increase_reps_per_set
    scaling_down:
      - kb_press_single
    typical_volume:
      sets: 3
      reps: 5
    sources:
      - Wildman
      - Pavel
    notes: >
      Both bells pressed from double rack simultaneously. Significantly higher systemic
      demand and core bracing requirement than single press. Cycle 1 in kettlebell
      workout schedule prominently features double KB push press and press at 2×16kg.

  - id: kb_push_press_single
    name: Kettlebell Push Press (Single-Arm)
    category: kettlebell
    modality:
      - power
      - strength_endurance
    equipment:
      - kettlebell
    effort: medium
    bilateral: false
    movement_patterns:
      - vertical_push
      - ballistic
    requires:
      - kb_press_single
      - kb_clean_single
    unlocks:
      - kb_jerk_single
    contraindicated_with:
      - shoulder_impingement
      - shoulder_instability
      - wrist_injury
      - knee_meniscus_post_op
    progressions:
      load: increase_bell_weight
      volume: increase_duration
      complexity: kb_jerk_single
    scaling_down:
      - kb_press_single
    typical_volume:
      sets: 3
      duration_sec: 60
    sources:
      - Wildman
      - Horsemen
    notes: >
      Hip dip drives bell off shoulder; arm locks out overhead. Horsemen warm-up
      protocol: 1 min push press each arm. KB workout standard warm-up cycle includes
      push press as timed interval. Bridge movement from strict press to jerk.

  - id: kb_jerk_single
    name: Kettlebell Jerk (Single-Arm)
    category: kettlebell
    modality:
      - power
      - strength_endurance
      - anaerobic_intervals
    equipment:
      - kettlebell
    effort: high
    bilateral: false
    movement_patterns:
      - vertical_push
      - ballistic
      - olympic_lift
    requires:
      - kb_clean_single
      - kb_push_press_single
    unlocks:
      - kb_jerk_double
    contraindicated_with:
      - shoulder_impingement
      - shoulder_instability
      - wrist_injury
      - knee_meniscus_post_op
      - ankle_sprain
    progressions:
      load: increase_bell_weight
      volume: increase_rpm_target
      complexity: kb_jerk_double
    scaling_down:
      - kb_push_press_single
    typical_volume:
      sets: 4
      duration_sec: 120
    sources:
      - Wildman
      - Pavel
    notes: >
      Double dip jerk: first dip drives bell overhead, second dip catches arm locked
      under bell. KB sport RPM target: 10 RPM at 1 pood (16kg). KB workout timed
      protocol: 8 min at 10 RPM, switching hands every 2 min. Primary KB pentathlon
      movement; 120 reps in 6 min (20 RPM) is the pentathlon standard.

  - id: kb_jerk_double
    name: Kettlebell Jerk (Double)
    category: kettlebell
    modality:
      - power
      - max_strength
      - anaerobic_intervals
    equipment:
      - kettlebell
    effort: max
    bilateral: true
    movement_patterns:
      - vertical_push
      - ballistic
      - olympic_lift
    requires:
      - kb_jerk_single
      - kb_clean_double
    unlocks: []
    contraindicated_with:
      - shoulder_impingement
      - shoulder_instability
      - wrist_injury
      - knee_meniscus_post_op
      - ankle_sprain
      - lumbar_disc
    progressions:
      load: increase_bell_weight
      volume: increase_rpm_target
    scaling_down:
      - kb_jerk_single
    typical_volume:
      sets: 5
      duration_sec: 60
    sources:
      - Wildman
      - Pavel
    notes: >
      Two bells jerked simultaneously from double rack. Highest systemic demand of
      all KB pressing patterns. Demands exceptional breathing mechanics and
      core stability. KB pentathlon long cycle clean & jerk uses double bells.

  - id: kb_snatch
    name: Kettlebell Snatch
    category: kettlebell
    modality:
      - power
      - strength_endurance
      - aerobic_base
    equipment:
      - kettlebell
    effort: high
    bilateral: false
    movement_patterns:
      - hip_hinge
      - olympic_lift
      - ballistic
      - vertical_push
    requires:
      - kb_swing_single_arm
      - kb_clean_single
    unlocks: []
    contraindicated_with:
      - lumbar_disc
      - shoulder_impingement
      - shoulder_instability
      - wrist_injury
      - hip_flexor_strain
    progressions:
      load: increase_bell_weight
      volume: increase_rpm_target
    scaling_down:
      - kb_swing_single_arm
      - kb_clean_single
    typical_volume:
      sets: 3
      duration_sec: 180
    sources:
      - Wildman
      - Pavel
      - Horsemen
    notes: >
      Bell punched from hip-hinge to overhead lockout in one movement. Horsemen 12-min
      complex: 1 min snatch each arm. Horsemen SSST standard: 200+ snatches in 10 min
      at 53# (Team Guy standard). KB pentathlon half-snatch: 108 reps in 6 min.
      KB sport RPM target: 14 RPM at 1 pood.

  - id: kb_squat_goblet
    name: Kettlebell Goblet Squat
    category: kettlebell
    modality:
      - strength_endurance
      - mobility
    equipment:
      - kettlebell
    effort: low
    bilateral: true
    movement_patterns:
      - squat
    requires:
      - hip_hinge
    unlocks:
      - kb_squat_double
      - kb_clean_single
    contraindicated_with:
      - knee_meniscus_post_op
      - hip_flexor_strain
    progressions:
      load: increase_bell_weight
      volume: increase_reps_per_set
      complexity: kb_squat_double
    scaling_down: []
    typical_volume:
      sets: 3
      reps: 10
    sources:
      - Gym Jones
      - Horsemen
    notes: >
      Bell held at chest level with both hands, elbows track inside knees. Gym Jones
      uses goblet squat (25#) in strength day warm-up: 2×5. Excellent teaching tool for
      squat mechanics. Low technical demand; appropriate as first-session squat pattern.

  - id: kb_squat_double
    name: Kettlebell Double Front Squat
    category: kettlebell
    modality:
      - max_strength
      - strength_endurance
    equipment:
      - kettlebell
    effort: high
    bilateral: true
    movement_patterns:
      - squat
    requires:
      - kb_squat_goblet
      - kb_clean_double
    unlocks: []
    contraindicated_with:
      - knee_meniscus_post_op
      - hip_flexor_strain
      - wrist_injury
    progressions:
      load: increase_bell_weight
      volume: increase_reps_per_set
    scaling_down:
      - kb_squat_goblet
    typical_volume:
      sets: 5
      reps: 5
    sources:
      - Wildman
      - Pavel
    notes: >
      Two bells held in rack position; front squat pattern. Anterior load demands
      significant thoracic extension and core bracing. More demanding than goblet
      squat; requires double clean to set up.

  - id: kb_tgu
    name: Kettlebell Turkish Get-Up
    category: kettlebell
    modality:
      - movement_skill
      - durability
      - strength_endurance
    equipment:
      - kettlebell
    effort: medium
    bilateral: false
    movement_patterns:
      - vertical_push
      - rotation
      - isometric
    requires:
      - bracing_mechanics
    unlocks:
      - kb_overhead_carry
      - kb_rack_carry
    contraindicated_with:
      - shoulder_impingement
      - shoulder_instability
      - wrist_injury
      - neck_strain
    progressions:
      load: increase_bell_weight
      volume: increase_reps_per_side
    scaling_down:
      - kb_halo
    typical_volume:
      sets: 5
      reps: 2
    sources:
      - Gym Jones
      - Horsemen
      - Wildman
    notes: >
      From lying to standing with bell locked overhead throughout; reverse to return.
      Foundational Wildman movement. Gym Jones programs 100 TGUs at 15# (recovery day)
      and 5–6 reps at 25# (strength day core work with 60-sec FLR). Horsemen SMMF:
      100 get-ups at 35# KB (15–20 min). Unlocks all overhead carries. Tests shoulder
      stability, hip mobility, and whole-body integration.

  - id: kb_deadlift
    name: Kettlebell Deadlift
    category: kettlebell
    modality:
      - max_strength
      - durability
    equipment:
      - kettlebell
    effort: low
    bilateral: true
    movement_patterns:
      - hip_hinge
    requires: []
    unlocks:
      - kb_swing_two_hand
      - kb_swing_single_arm
    contraindicated_with:
      - lumbar_disc
      - hip_flexor_strain
    progressions:
      load: increase_bell_weight
      volume: increase_reps_per_set
      complexity: kb_swing_two_hand
    scaling_down: []
    typical_volume:
      sets: 3
      reps: 10
    sources:
      - Wildman
      - Pavel
    notes: >
      Hip-hinge pattern with kettlebell between feet, pulled to standing. No prerequisites
      beyond basic motor control; appropriate as the first movement taught. Scaling-down
      option for barbell deadlift. Direct gateway to swings; teaches the hip hinge
      without ballistic demand.

  - id: kb_step_up
    name: Kettlebell Step-Up (Single-Arm)
    category: kettlebell
    modality:
      - max_strength
      - durability
    equipment:
      - kettlebell
    effort: high
    bilateral: false
    movement_patterns:
      - step_up
      - squat
    requires:
      - squat_pattern
    unlocks:
      - weighted_step_up
    contraindicated_with:
      - knee_meniscus_post_op
      - knee_osteoarthritis
    progressions:
      load: increase_bell_weight
      volume: increase_reps_per_set
      complexity: weighted_step_up
    scaling_down:
      - single_leg_squat_box
    typical_volume:
      sets: 5
      reps: 2
    sources:
      - "Gym Jones"
      - "Dan John"
    notes: >
      Single-arm kettlebell step-up. Hold one KB at the chest (rack) or goblet position.
      Drive through the heel of the lead foot; no assistance from the trailing leg.
      5×2 each side at a heavy bell. KB step-up approximates the Gym Jones loaded step-up
      protocol when a barbell is unavailable. Box height governs difficulty — a higher box
      increases unilateral demand.

  - id: kb_row_single
    name: Kettlebell Row (Single-Arm)
    category: kettlebell
    modality:
      - max_strength
      - strength_endurance
    equipment:
      - kettlebell
    effort: medium
    bilateral: false
    movement_patterns:
      - horizontal_pull
      - hip_hinge
    requires:
      - kb_deadlift
    unlocks: []
    contraindicated_with:
      - lumbar_disc
      - tennis_elbow
      - golfers_elbow
    progressions:
      load: increase_bell_weight
      volume: increase_reps_per_set
    scaling_down:
      - kb_deadlift
    typical_volume:
      sets: 3
      reps: 10
    sources:
      - Gym Jones
    notes: >
      Hip-hinged torso; opposite hand braced on knee or bench. Bell pulled to hip.
      Gym Jones programs one-arm row in circuit days. Anti-rotation demand develops
      lateral core stability absent from bilateral barbell rows.

  - id: kb_figure_eight
    name: Kettlebell Figure-Eight
    category: kettlebell
    modality:
      - movement_skill
      - strength_endurance
      - mobility
    equipment:
      - kettlebell
    effort: low
    bilateral: true
    movement_patterns:
      - rotation
    requires:
      - kb_swing_two_hand
    unlocks:
      - kb_windmill
    contraindicated_with:
      - lumbar_disc
      - hip_flexor_strain
      - knee_meniscus_post_op
    progressions:
      load: increase_bell_weight
      volume: increase_duration
    scaling_down:
      - kb_swing_two_hand
    typical_volume:
      sets: 3
      duration_sec: 60
    sources:
      - Horsemen
    notes: >
      Bell passed between legs in figure-eight pattern, alternating hands. Horsemen
      12-min warm-up complex includes figure-eight both directions. Develops rotational
      hip mobility, lateral hip hinge control, and hand-switching timing.

  - id: kb_halo
    name: Kettlebell Halo
    category: kettlebell
    modality:
      - mobility
      - movement_skill
    equipment:
      - kettlebell
    effort: low
    bilateral: true
    movement_patterns:
      - rotation
    requires: []
    unlocks:
      - kb_tgu
      - kb_windmill
    contraindicated_with:
      - shoulder_impingement
      - shoulder_instability
      - neck_strain
      - wrist_injury
    progressions:
      load: increase_bell_weight
      volume: increase_reps_per_set
    scaling_down: []
    typical_volume:
      sets: 3
      reps: 10
    sources:
      - Horsemen
    notes: >
      Bell circled around the head in a halo pattern, both directions. Horsemen 12-min
      complex includes slasher-to-halo. Develops thoracic and shoulder mobility; prepares
      the shoulder girdle for overhead loading. Appropriate as first-session shoulder prep.

  - id: kb_windmill
    name: Kettlebell Windmill
    category: kettlebell
    modality:
      - mobility
      - movement_skill
      - durability
    equipment:
      - kettlebell
    effort: low
    bilateral: false
    movement_patterns:
      - rotation
      - hip_hinge
      - vertical_push
    requires:
      - kb_tgu
      - kb_halo
    unlocks: []
    contraindicated_with:
      - shoulder_impingement
      - shoulder_instability
      - lumbar_disc
      - wrist_injury
      - hip_flexor_strain
    progressions:
      load: increase_bell_weight
      volume: increase_reps_per_side
    scaling_down:
      - kb_halo
    typical_volume:
      sets: 3
      reps: 5
    sources:
      - Wildman
      - Pavel
    notes: >
      Bell locked overhead; athlete hinges laterally to touch floor with free hand,
      maintaining overhead lockout. Develops lateral hip mobility, shoulder stability
      under rotation, and hamstring length. One of the most demanding single-arm
      overhead stability exercises.

  - id: kb_farmer_carry
    name: Kettlebell Farmer Carry (Single)
    category: kettlebell
    modality:
      - durability
      - strength_endurance
    equipment:
      - kettlebell
      - open_space
    effort: medium
    bilateral: false
    movement_patterns:
      - loaded_carry
      - isometric
      - locomotion
    requires:
      - kb_deadlift
    unlocks:
      - kb_farmer_carry_double
      - kb_suitcase_carry
    contraindicated_with:
      - hip_flexor_strain
    progressions:
      load: increase_bell_weight
      volume: increase_distance_m
    scaling_down:
      - kb_deadlift
    typical_volume:
      sets: 4
      distance_m: 40
    sources:
      - Gym Jones
      - Horsemen
    notes: >
      Single kettlebell carried in one hand at side for distance or time. Asymmetric
      load demands lateral core stability. Gym Jones programs farmer carry in loaded
      carry circuits. Foundation for all loaded carry variants.

  - id: kb_farmer_carry_double
    name: Kettlebell Farmer Carry (Double)
    category: kettlebell
    modality:
      - durability
      - strength_endurance
    equipment:
      - kettlebell
      - open_space
    effort: high
    bilateral: true
    movement_patterns:
      - loaded_carry
      - isometric
      - locomotion
    requires:
      - kb_farmer_carry
    unlocks: []
    contraindicated_with:
      - hip_flexor_strain
      - lumbar_disc
    progressions:
      load: increase_bell_weight
      volume: increase_distance_m
    scaling_down:
      - kb_farmer_carry
    typical_volume:
      sets: 4
      distance_m: 40
    sources:
      - Gym Jones
      - Horsemen
    notes: >
      Two kettlebells carried bilaterally for distance or time. Featured in AMRAP
      kettlebell workouts (20m farmer's walk between sets). Develops grip endurance,
      trapezius, and lateral core under bilateral load.

  - id: kb_suitcase_carry
    name: Kettlebell Suitcase Carry
    category: kettlebell
    modality:
      - durability
      - strength_endurance
    equipment:
      - kettlebell
      - open_space
    effort: medium
    bilateral: false
    movement_patterns:
      - loaded_carry
      - isometric
      - locomotion
    requires:
      - kb_farmer_carry
    unlocks: []
    contraindicated_with:
      - lumbar_disc
      - hip_flexor_strain
    progressions:
      load: increase_bell_weight
      volume: increase_distance_m
    scaling_down:
      - kb_farmer_carry
    typical_volume:
      sets: 4
      distance_m: 40
    sources:
      - Gym Jones
      - Horsemen
    notes: >
      Identical to farmer carry but emphasizes anti-lateral-flexion: the athlete
      resists the bell pulling the torso sideways. Gym Jones programs suitcase carry
      in loaded carry circuits. Trains the quadratus lumborum and lateral core in
      a functional walking pattern.

  - id: kb_rack_carry
    name: Kettlebell Rack Carry
    category: kettlebell
    modality:
      - durability
      - strength_endurance
    equipment:
      - kettlebell
      - open_space
    effort: medium
    bilateral: false
    movement_patterns:
      - loaded_carry
      - isometric
      - locomotion
    requires:
      - kb_clean_single
      - kb_tgu
    unlocks:
      - kb_overhead_carry
    contraindicated_with:
      - wrist_injury
      - shoulder_instability
    progressions:
      load: increase_bell_weight
      volume: increase_distance_m
    scaling_down:
      - kb_farmer_carry
    typical_volume:
      sets: 4
      distance_m: 40
    sources:
      - Horsemen
    notes: >
      Bell held in rack position at shoulder while walking. Anti-flexion and
      anti-rotation demand on the ipsilateral hip and core. Horsemen progressive
      TGU protocol feeds into rack carry as shoulder stability development.
      Intermediate between farmer carry and overhead carry.

  - id: kb_overhead_carry
    name: Kettlebell Overhead Carry
    category: kettlebell
    modality:
      - durability
      - movement_skill
    equipment:
      - kettlebell
      - open_space
    effort: medium
    bilateral: false
    movement_patterns:
      - loaded_carry
      - vertical_push
      - isometric
      - locomotion
    requires:
      - kb_press_single
      - kb_tgu
    unlocks: []
    contraindicated_with:
      - shoulder_impingement
      - shoulder_instability
      - wrist_injury
      - neck_strain
    progressions:
      load: increase_bell_weight
      volume: increase_distance_m
    scaling_down:
      - kb_rack_carry
    typical_volume:
      sets: 4
      distance_m: 30
    sources:
      - Horsemen
    notes: >
      Bell pressed and held at full overhead lockout while walking. Maximum shoulder
      stability demand of all carry variants. Scapular upward rotation and packed
      shoulder essential. Horsemen uses overhead carries in loaded carry circuits.
      Requires intact shoulder function; contraindicated with most shoulder pathologies.

  - id: kb_complex_12min
