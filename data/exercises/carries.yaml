exercises:

  - id: farmer_carry_barbell
    name: Farmer Carry (Barbell)
    category: loaded_carry
    modality:
      - durability
      - strength_endurance
    equipment:
      - barbell
      - plates
      - open_space
    effort: medium
    bilateral: true
    movement_patterns:
      - loaded_carry
      - isometric
      - farmer_carry
    requires:
      - bracing_mechanics
    unlocks:
      - rack_carry_barbell
      - overhead_carry_barbell
    contraindicated_with:
      - lumbar_disc_pathology
    progressions:
      load: add_5kg_per_session
      volume: increase_distance
    scaling_down:
      - farmer_carry_db
    typical_volume:
      sets: 4
      distance_m: 40
    sources:
      - Horsemen
      - Gym Jones
    notes: >
      Barbell held at thigh in each hand (trap-bar if available) or one barbell
      in each hand. Higher load ceiling than KB or DB variant; useful for
      max-load carries. Maintain neutral spine; no lateral lean. Gym Jones
      programs farmer carry as a loaded carry accessory.

  - id: farmer_carry_kb
    name: Farmer Carry (Kettlebell)
    category: loaded_carry
    modality:
      - durability
      - strength_endurance
    equipment:
      - kettlebell
      - open_space
    effort: medium
    bilateral: true
    movement_patterns:
      - loaded_carry
      - isometric
      - farmer_carry
    requires:
      - bracing_mechanics
    unlocks:
      - rack_carry_kb
      - overhead_carry_kb
    contraindicated_with:
      - lumbar_disc_pathology
    progressions:
      load: increase_bell_weight
      volume: increase_distance
      complexity: rack_carry_kb
    scaling_down: []
    typical_volume:
      sets: 4
      distance_m: 40
    sources:
      - Horsemen
      - CrossFit
    notes: >
      Primary farmer carry variation. One KB in each hand, arms straight, packed
      shoulders. High grip, trapezius, and core anti-lateral-flexion demand.
      Horsemen and SOF-style GPP staple. Unlocks rack and overhead carry
      once positional stability is established.

  - id: farmer_carry_db
    name: Farmer Carry (Dumbbell)
    category: loaded_carry
    modality:
      - durability
      - strength_endurance
    equipment:
      - dumbbell
      - open_space
    effort: medium
    bilateral: true
    movement_patterns:
      - loaded_carry
      - isometric
      - farmer_carry
    requires:
      - bracing_mechanics
    unlocks:
      - farmer_carry_kb
    contraindicated_with:
      - lumbar_disc_pathology
    progressions:
      load: increase_dumbbell_weight
      volume: increase_distance
    scaling_down: []
    typical_volume:
      sets: 3
      distance_m: 30
    sources:
      - Gym Jones
      - CrossFit
    notes: >
      Entry-level farmer carry using dumbbells. Lower load ceiling than KB or
      barbell but accessible with standard gym equipment. Technique and
      breathing mechanics same as KB variant. Gym Jones uses DB carries in
      circuit and accumulation days.

  - id: rack_carry_kb
    name: Rack Carry (Kettlebell)
    category: loaded_carry
    modality:
      - durability
      - strength_endurance
    equipment:
      - kettlebell
      - open_space
    effort: medium
    bilateral: true
    movement_patterns:
      - loaded_carry
      - isometric
      - rack_carry
    requires:
      - farmer_carry_kb
      - kb_clean
    unlocks:
      - overhead_carry_kb
    contraindicated_with:
      - wrist_injury
      - elbow_tendinopathy
    progressions:
      load: increase_bell_weight
      volume: increase_distance
      complexity: overhead_carry_kb
    scaling_down:
      - farmer_carry_kb
    typical_volume:
      sets: 4
      distance_m: 40
    sources:
      - Horsemen
      - CrossFit
    notes: >
      KB(s) held in rack position (bell resting on forearm, elbow tucked, wrist
      neutral). Core bracing and vertical posture are the primary demands. Can
      be done unilaterally (one bell) or bilaterally. Unilateral rack carry is
      a strong anti-lateral-flexion challenge.

  - id: rack_carry_barbell
    name: Rack Carry (Barbell — Front Rack)
    category: loaded_carry
    modality:
      - durability
      - strength_endurance
    equipment:
      - barbell
      - plates
      - open_space
    effort: high
    bilateral: true
    movement_patterns:
      - loaded_carry
      - isometric
      - rack_carry
    requires:
      - farmer_carry_barbell
      - front_squat
    unlocks:
      - overhead_carry_barbell
    contraindicated_with:
      - wrist_injury
      - elbow_tendinopathy
      - lumbar_disc_pathology
    progressions:
      load: add_5kg_per_session
      volume: increase_distance
      complexity: overhead_carry_barbell
    scaling_down:
      - rack_carry_kb
    typical_volume:
      sets: 3
      distance_m: 30
    sources:
      - Horsemen
      - CrossFit
    notes: >
      Barbell in front-rack position (fingertips on bar, elbows high) while
      walking. High thoracic mobility and wrist mobility demand. Used in
      Horsemen-style loaded carry circuits. Heavier loading ceiling than
      KB variant.

  - id: overhead_carry_kb
    name: Overhead Carry (Kettlebell)
    category: loaded_carry
    modality:
      - durability
      - strength_endurance
    equipment:
      - kettlebell
      - open_space
    effort: high
    bilateral: false
    movement_patterns:
      - loaded_carry
      - vertical_push
      - isometric
    requires:
      - rack_carry_kb
      - shoulder_stability
    unlocks: []
    contraindicated_with:
      - shoulder_impingement
      - shoulder_instability
      - wrist_injury
    progressions:
      load: increase_bell_weight
      volume: increase_distance
    scaling_down:
      - rack_carry_kb
    typical_volume:
      sets: 4
      distance_m: 30
    sources:
      - Horsemen
      - CrossFit
    notes: >
      KB locked out overhead, arm fully extended, shoulder packed (active
      upward rotation). Typically performed unilaterally; bilateral variant
      possible with two bells. High rotator cuff and serratus anterior demand.
      Walk tall; do not side-bend under load. Train each arm independently.

  - id: overhead_carry_barbell
    name: Overhead Carry (Barbell)
    category: loaded_carry
    modality:
      - durability
      - strength_endurance
    equipment:
      - barbell
      - plates
      - open_space
    effort: high
    bilateral: true
    movement_patterns:
      - loaded_carry
      - vertical_push
      - isometric
    requires:
      - rack_carry_barbell
      - overhead_squat
      - shoulder_stability
    unlocks: []
    contraindicated_with:
      - shoulder_impingement
      - shoulder_instability
      - wrist_injury
    progressions:
      load: add_5kg_per_session
      volume: increase_distance
    scaling_down:
      - overhead_carry_kb
    typical_volume:
      sets: 3
      distance_m: 20
    sources:
      - Gym Jones
      - Horsemen
    notes: >
      Barbell locked out overhead while walking. Gym Jones programs overhead
      hold static (300-sec accumulated) as a core/shoulder endurance component;
      overhead carry is the ambulatory progression. High scapular and rotator
      cuff demand. Requires solid overhead squat mechanics before loading.

  - id: suitcase_carry
    name: Suitcase Carry (Unilateral)
    category: loaded_carry
    modality:
      - durability
      - strength_endurance
    equipment:
      - kettlebell
      - open_space
    effort: medium
    bilateral: false
    movement_patterns:
      - loaded_carry
      - isometric
    requires:
      - bracing_mechanics
    unlocks: []
    contraindicated_with:
      - lumbar_disc_pathology
      - lumbar_spondylolysis
    progressions:
      load: increase_bell_weight
      volume: increase_distance
    scaling_down:
      - farmer_carry_kb
    typical_volume:
      sets: 4
      distance_m: 30
    sources:
      - Gym Jones
      - Horsemen
    notes: >
      Single implement (KB, DB, or heavy object) carried on one side while
      maintaining a vertical torso. Primary anti-lateral-flexion demand on the
      contralateral oblique/quadratus lumborum. Gym Jones references suitcase
      carry in loaded carry accessory work. Alternate sides each set.

  - id: zercher_carry
    name: Zercher Carry (Barbell)
    category: loaded_carry
    modality:
      - durability
      - strength_endurance
    equipment:
      - barbell
      - plates
      - open_space
    effort: high
    bilateral: true
    movement_patterns:
      - loaded_carry
      - isometric
      - squat
    requires:
      - bracing_mechanics
      - front_squat
    unlocks: []
    contraindicated_with:
      - lumbar_disc_pathology
      - elbow_bursitis
    progressions:
      load: add_5kg_per_session
      volume: increase_distance
    scaling_down:
      - rack_carry_barbell
    typical_volume:
      sets: 3
      distance_m: 20
    sources:
      - Horsemen
    notes: >
      Barbell held in the crook of the elbows, forearms crossed. Chest-level
      load keeps the centre of mass high and forward. High anterior core
      demand; upper-back and biceps fatigue is a limiting factor. Horsemen
      GPP carries this as a sandbag or barbell variation.

  - id: yoke_carry
    name: Yoke Carry
    category: loaded_carry
    modality:
      - durability
      - max_strength
      - strength_endurance
    equipment:
      - sled
      - open_space
    effort: max
    bilateral: true
    movement_patterns:
      - loaded_carry
      - isometric
    requires:
      - bracing_mechanics
      - back_squat
    unlocks: []
    contraindicated_with:
      - lumbar_disc_pathology
      - knee_meniscus_post_op
    progressions:
      load: add_10kg_per_session
      volume: increase_distance
    scaling_down:
      - farmer_carry_barbell
    typical_volume:
      sets: 4
      distance_m: 20
    sources:
      - Horsemen
    notes: >
      A-frame yoke loaded with plates; athlete walks under the yoke with the
      crossbar across the upper back. Highest absolute load potential in the
      carry family. Strong-man derivative used in Horsemen GPP for total-body
      structural durability and compressive loading.

  - id: sandbag_shoulder_carry
    name: Sandbag Shoulder Carry
    category: loaded_carry
    modality:
      - durability
      - strength_endurance
    equipment:
      - sandbag
      - open_space
    effort: medium
    bilateral: false
    movement_patterns:
      - loaded_carry
      - isometric
    requires:
      - bracing_mechanics
    unlocks:
      - sandbag_bear_hug_carry
    contraindicated_with:
      - lumbar_disc_pathology
      - cervical_injury
    progressions:
      load: increase_sandbag_weight
      volume: increase_distance
      complexity: sandbag_bear_hug_carry
    scaling_down: []
    typical_volume:
      sets: 4
      distance_m: 40
    sources:
      - Horsemen
    notes: >
      Sandbag draped over one shoulder, load sitting on the upper trapezius.
      Horsemen staple for GPP and durability work. Unilateral; alternate
      shoulders each set or at midpoint. The uneven, shifting load of the
      sandbag demands continuous stabilisation that rigid implements do not.

  - id: sandbag_bear_hug_carry
    name: Sandbag Bear-Hug Carry
    category: loaded_carry
    modality:
      - durability
      - strength_endurance
    equipment:
      - sandbag
      - open_space
    effort: high
    bilateral: true
    movement_patterns:
      - loaded_carry
      - isometric
    requires:
      - sandbag_shoulder_carry
    unlocks: []
    contraindicated_with:
      - lumbar_disc_pathology
      - rib_injury
    progressions:
      load: increase_sandbag_weight
      volume: increase_distance
    scaling_down:
      - sandbag_shoulder_carry
    typical_volume:
      sets: 3
      distance_m: 30
    sources:
      - Horsemen
    notes: >
      Sandbag hugged against the chest with both arms. High anterior core and
      thoracic erector demand. Breathing is compressed; heavy bags become a
      respiratory challenge as well as a strength-endurance test. Horsemen
      GPP primary sandbag carry.

  - id: ruck_carry
    name: Ruck Carry (Loaded — Strength Focus)
    category: loaded_carry
    modality:
      - durability
      - strength_endurance
    equipment:
      - ruck_pack
      - open_space
    effort: medium
    bilateral: true
    movement_patterns:
      - loaded_carry
      - isometric
      - locomotion
    requires:
      - bracing_mechanics
    unlocks: []
    contraindicated_with:
      - lumbar_disc_pathology
      - cervical_injury
      - achilles_tendinopathy
    progressions:
      load: increase_pack_weight
      volume: increase_distance
    scaling_down: []
    typical_volume:
      sets: 1
      distance_m: 3000
    sources:
      - Horsemen
    notes: >
      Slow, heavy, deliberate loaded carry as a strength-endurance exercise,
      distinct from the aerobic ruck (which is higher volume, lower load,
      time-based). Pack weight ≥30% bodyweight; pace is controlled walk.
      Horsemen Fan Dance standard: 30kg, 22km with +1000m elevation. This
      entry targets shorter heavy training sets rather than aerobic events.

  - id: tire_drag_forward
    name: Tire Drag (Forward)
    category: loaded_carry
    modality:
      - durability
      - strength_endurance
    equipment:
      - tire
      - open_space
    effort: high
    bilateral: true
    movement_patterns:
      - loaded_carry
      - locomotion
      - hip_hinge
    requires:
      - bracing_mechanics
    unlocks:
      - tire_drag_backward
    contraindicated_with:
      - knee_meniscus_post_op
      - achilles_tendinopathy
      - ankle_sprain
    progressions:
      load: add_weight_to_tire
      volume: increase_distance
    scaling_down: []
    typical_volume:
      sets: 4
      distance_m: 30
    sources:
      - Horsemen
      - CrossFit
    notes: >
      Harness or rope attached to tire; athlete walks or runs forward dragging
      load. High posterior chain, hip, and grip demand. Horsemen GPP staple.
      Impact-free locomotion pattern useful when running volume is high. Tyre
      weight adjusted by adding plates inside.

  - id: tire_drag_backward
    name: Tire Drag (Backward)
    category: loaded_carry
    modality:
      - durability
      - strength_endurance
      - rehab
    equipment:
      - tire
      - open_space
    effort: medium
    bilateral: true
    movement_patterns:
      - loaded_carry
      - locomotion
      - knee_extension
    requires:
      - tire_drag_forward
    unlocks: []
    contraindicated_with:
      - knee_meniscus_post_op
      - achilles_tendinopathy
    progressions:
      load: add_weight_to_tire
      volume: increase_distance
    scaling_down:
      - tire_drag_forward
    typical_volume:
      sets: 4
      distance_m: 30
    sources:
      - Horsemen
      - ATG
    notes: >
      Backward walking with tire in tow. ATG / Knees Over Toes principle:
      backward sled and tire drag loads the VMO and quad through terminal
      extension range without compressive load on the knee. Used in Horsemen
      GPP and as a knee prehab modality. Primary quad-focused carry variant.

  - id: sled_push
    name: Sled Push
    category: loaded_carry
    modality:
      - durability
      - strength_endurance
      - anaerobic_intervals
    equipment:
      - sled
      - open_space
    effort: high
    bilateral: true
    movement_patterns:
      - loaded_carry
      - locomotion
      - horizontal_push
    requires:
      - bracing_mechanics
    unlocks: []
    contraindicated_with:
      - knee_meniscus_post_op
      - achilles_tendinopathy
      - lumbar_disc_pathology
    progressions:
      load: add_plates_to_sled
      volume: increase_distance
    scaling_down:
      - tire_drag_forward
    typical_volume:
      sets: 6
      distance_m: 20
    sources:
      - Horsemen
      - CrossFit
    notes: >
      Low (handles near ground, body angled forward) or upright (handles at
      chest height) variants. High-load sled push develops strength-endurance
      and posterior chain drive; lighter fast sled push develops anaerobic
      power. No eccentric component — extremely low DOMS; can be programmed
      frequently. Horsemen GPP uses sled push as a primary conditioning tool.
