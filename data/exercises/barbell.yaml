exercises:

  - id: back_squat
    name: Back Squat
    category: barbell
    modality:
      - max_strength
      - relative_strength
    equipment:
      - barbell
      - rack
      - plates
    effort: high
    bilateral: true
    movement_patterns:
      - squat
      - hip_hinge
    requires:
      - hip_hinge
      - bracing_mechanics
    unlocks:
      - front_squat
      - box_squat
      - overhead_squat
      - barbell_complex
    contraindicated_with:
      - knee_meniscus_post_op
      - hip_flexor_strain
      - lumbar_disc
    progressions:
      load: add_2.5_5kg_per_session_novice
      volume: progress_3x5_to_5x5
      complexity: front_squat
    scaling_down:
      - box_squat
      - goblet_squat
    typical_volume:
      sets: 3
      reps: 5
    sources:
      - Starting Strength
      - Horsemen
      - Gym Jones
    notes: >
      Foundational lower-body strength movement. Horsemen standard: 2×BW squat.
      Starting Strength uses 3×5 linear progression as primary novice driver.

  - id: front_squat
    name: Front Squat
    category: barbell
    modality:
      - max_strength
      - relative_strength
    equipment:
      - barbell
      - rack
      - plates
    effort: high
    bilateral: true
    movement_patterns:
      - squat
    requires:
      - back_squat
      - bracing_mechanics
    unlocks:
      - overhead_squat
      - squat_clean
      - hang_squat_clean
      - thruster
    contraindicated_with:
      - knee_meniscus_post_op
      - wrist_injury
      - shoulder_impingement
      - hip_flexor_strain
    progressions:
      load: add_2.5_5kg_per_session
      volume: progress_3x3_to_5x3
      complexity: overhead_squat
    scaling_down:
      - back_squat
      - box_squat
    typical_volume:
      sets: 5
      reps: 2
    sources:
      - Gym Jones
      - Horsemen
      - Starting Strength
    notes: >
      Featured prominently in Gym Jones Operator programs (10×2 @ 1-min rest) and
      Horsemen strength cycles. Horsemen standard: 1.5×BW front squat.
      Requires wrist mobility and upright torso.

  - id: overhead_squat
    name: Overhead Squat
    category: barbell
    modality:
      - max_strength
      - mobility
      - movement_skill
    equipment:
      - barbell
      - plates
    effort: high
    bilateral: true
    movement_patterns:
      - squat
      - vertical_push
    requires:
      - front_squat
      - bracing_mechanics
    unlocks:
      - snatch
    contraindicated_with:
      - shoulder_impingement
      - shoulder_instability
      - wrist_injury
      - knee_meniscus_post_op
      - lumbar_disc
    progressions:
      load: add_2.5kg_per_session
      volume: progress_3x3_to_5x3
    scaling_down:
      - front_squat
      - kb_squat_goblet
    typical_volume:
      sets: 5
      reps: 3
    sources:
      - Gym Jones
      - Horsemen
    notes: >
      Gym Jones uses OHS 5×3 as primary strength movement and tests 1RM.
      Demands significant shoulder mobility, thoracic extension, and ankle dorsiflexion.
      Referenced in Gym Jones SOTS press variant.

  - id: box_squat
    name: Box Squat
    category: barbell
    modality:
      - max_strength
      - strength_endurance
    equipment:
      - barbell
      - rack
      - plates
      - box
    effort: medium
    bilateral: true
    movement_patterns:
      - squat
      - hip_hinge
    requires:
      - back_squat
    unlocks: []
    contraindicated_with:
      - knee_meniscus_post_op
      - hip_flexor_strain
    progressions:
      load: add_2.5_5kg_per_session
      volume: add_sets
    scaling_down:
      - back_squat
    typical_volume:
      sets: 5
      reps: 2
    sources:
      - Starting Strength
    notes: >
      Posterior-chain emphasis squat variant. Pausing on box removes stretch reflex
      and increases demand on hip extensors. Useful for athletes with poor squat depth
      mechanics or as powerlifting variation.

  - id: deadlift
    name: Deadlift
    category: barbell
    modality:
      - max_strength
      - relative_strength
    equipment:
      - barbell
      - plates
    effort: high
    bilateral: true
    movement_patterns:
      - hip_hinge
    requires:
      - bracing_mechanics
    unlocks:
      - romanian_deadlift
      - sumo_deadlift
      - deficit_deadlift
      - power_clean
      - barbell_row
      - pendlay_row
      - good_morning
    contraindicated_with:
      - lumbar_disc
      - hip_flexor_strain
    progressions:
      load: add_5kg_per_session_novice
      volume: progress_1x5_to_3x3
      complexity: sumo_deadlift
    scaling_down:
      - kb_deadlift
      - romanian_deadlift
    typical_volume:
      sets: 1
      reps: 5
    sources:
      - Starting Strength
      - Horsemen
      - Gym Jones
    notes: >
      Horsemen standard: 2.5×BW deadlift. Starting Strength programs 1×5 as novice
      primary. Gym Jones tests 1RM and builds training percentages from it (80% common).
      King of posterior-chain loading; prerequisite for all Olympic lifting derivatives.

  - id: romanian_deadlift
    name: Romanian Deadlift
    category: barbell
    modality:
      - max_strength
      - durability
    equipment:
      - barbell
      - plates
    effort: medium
    bilateral: true
    movement_patterns:
      - hip_hinge
    requires:
      - deadlift
    unlocks:
      - good_morning
    contraindicated_with:
      - lumbar_disc
      - hip_flexor_strain
    progressions:
      load: add_5kg_per_session
      volume: add_sets
    scaling_down:
      - kb_deadlift
    typical_volume:
      sets: 3
      reps: 8
    sources:
      - Starting Strength
      - Gym Jones
    notes: >
      Gym Jones programs SLDL (stiff-leg DL / RDL) at 95–135# for 3×10 in
      Accumulation sessions. Emphasizes hamstring length and posterior-chain resilience.
      Hip hingeing with a neutral spine under load; bar remains close to legs.

  - id: sumo_deadlift
    name: Sumo Deadlift
    category: barbell
    modality:
      - max_strength
    equipment:
      - barbell
      - plates
    effort: high
    bilateral: true
    movement_patterns:
      - hip_hinge
    requires:
      - deadlift
    unlocks:
      - deficit_deadlift
    contraindicated_with:
      - lumbar_disc
      - hip_flexor_strain
      - knee_meniscus_post_op
    progressions:
      load: add_5kg_per_session
      volume: progress_1x5_to_3x3
    scaling_down:
      - deadlift
    typical_volume:
      sets: 3
      reps: 3
    sources:
      - Starting Strength
    notes: >
      Wide-stance deadlift variant shifting more demand to hip abductors and quads.
      Shorter range of motion than conventional; suits athletes with longer torsos
      or limited hip mobility.

  - id: deficit_deadlift
    name: Deficit Deadlift
    category: barbell
    modality:
      - max_strength
      - strength_endurance
    equipment:
      - barbell
      - plates
    effort: high
    bilateral: true
    movement_patterns:
      - hip_hinge
    requires:
      - deadlift
      - sumo_deadlift
    unlocks: []
    contraindicated_with:
      - lumbar_disc
      - hip_flexor_strain
      - knee_meniscus_post_op
      - ankle_sprain
    progressions:
      load: add_5kg_per_session
      volume: add_sets
    scaling_down:
      - deadlift
    typical_volume:
      sets: 4
      reps: 3
    sources:
      - Horsemen
    notes: >
      Performed standing on plates or blocks (2–4 inch deficit). Increases range of
      motion demanding greater hip and hamstring recruitment at the bottom. Builds
      starting strength off the floor.

  - id: bench_press
    name: Bench Press
    category: barbell
    modality:
      - max_strength
    equipment:
      - barbell
      - rack
      - plates
    effort: high
    bilateral: true
    movement_patterns:
      - horizontal_push
    requires:
      - bracing_mechanics
    unlocks:
      - close_grip_bench
      - floor_press
    contraindicated_with:
      - shoulder_impingement
      - shoulder_instability
      - wrist_injury
      - tennis_elbow
    progressions:
      load: add_2.5kg_per_session_novice
      volume: progress_3x5_to_5x5
      complexity: close_grip_bench
    scaling_down:
      - floor_press
      - push_press
    typical_volume:
      sets: 3
      reps: 5
    sources:
      - Starting Strength
      - Horsemen
    notes: >
      Horsemen standard: 1.5×BW bench press. Starting Strength uses 3×5 linear
      progression as novice primary horizontal pressing movement.

  - id: floor_press
    name: Floor Press
    category: barbell
    modality:
      - max_strength
      - strength_endurance
    equipment:
      - barbell
      - plates
    effort: high
    bilateral: true
    movement_patterns:
      - horizontal_push
    requires:
      - bench_press
    unlocks: []
    contraindicated_with:
      - shoulder_instability
      - wrist_injury
      - tennis_elbow
      - elbow_injury
    progressions:
      load: add_2.5kg_per_session
      volume: add_sets
    scaling_down:
      - bench_press
    typical_volume:
      sets: 3
      reps: 5
    sources:
      - Gym Jones
    notes: >
      Pressing from the floor eliminates the leg drive and stretch reflex from bench
      pressing. Used in Gym Jones programming; limits range of motion which can be
      shoulder-friendly for some presentations. Removes lower-body contribution.

  - id: close_grip_bench
    name: Close-Grip Bench Press
    category: barbell
    modality:
      - max_strength
      - strength_endurance
    equipment:
      - barbell
      - rack
      - plates
    effort: high
    bilateral: true
    movement_patterns:
      - horizontal_push
    requires:
      - bench_press
    unlocks: []
    contraindicated_with:
      - shoulder_impingement
      - shoulder_instability
      - wrist_injury
      - tennis_elbow
      - golfers_elbow
    progressions:
      load: add_2.5kg_per_session
      volume: add_sets
    scaling_down:
      - bench_press
      - floor_press
    typical_volume:
      sets: 3
      reps: 6
    sources:
      - Starting Strength
    notes: >
      Grip inside shoulder width, elbows tucked. Shifts demand toward triceps and
      medial deltoid. Used as tricep-dominant pressing accessory. Grip narrower
      than shoulder-width but not so narrow as to cause wrist deviation.

  - id: strict_press
    name: Strict Press (Overhead)
    category: barbell
    modality:
      - max_strength
      - relative_strength
    equipment:
      - barbell
      - rack
      - plates
    effort: high
    bilateral: true
    movement_patterns:
      - vertical_push
    requires:
      - bracing_mechanics
    unlocks:
      - push_press
      - push_jerk
    contraindicated_with:
      - shoulder_impingement
      - shoulder_instability
      - neck_strain
      - wrist_injury
    progressions:
      load: add_2.5kg_per_session_novice
      volume: progress_3x5_to_5x5
      complexity: push_press
    scaling_down:
      - kb_press_single
      - kb_press_double
    typical_volume:
      sets: 3
      reps: 5
    sources:
      - Starting Strength
      - Horsemen
    notes: >
      Horsemen standard: 1×BW military press. Starting Strength uses 3×5 linear
      progression. No leg drive permitted; pure upper-body pressing strength.
      Foundational prerequisite for all jerk and push-press variants.

  - id: push_press
    name: Push Press
    category: barbell
    modality:
      - max_strength
      - power
    equipment:
      - barbell
      - rack
      - plates
    effort: high
    bilateral: true
    movement_patterns:
      - vertical_push
      - ballistic
    requires:
      - strict_press
    unlocks:
      - push_jerk
      - split_jerk
    contraindicated_with:
      - shoulder_impingement
      - shoulder_instability
      - knee_meniscus_post_op
      - wrist_injury
    progressions:
      load: add_2.5_5kg_per_session
      volume: add_sets
      complexity: push_jerk
    scaling_down:
      - strict_press
    typical_volume:
      sets: 4
      reps: 4
    sources:
      - Gym Jones
      - Horsemen
    notes: >
      Hip dip and drive transfers leg power into the bar; arms lockout overhead.
      Used in Gym Jones Six-Way Barbell Complex and Horsemen power-endurance
      workouts (e.g. 5 push press while holding 45# bar for 400m).

  - id: push_jerk
    name: Push Jerk
    category: barbell
    modality:
      - power
      - max_strength
    equipment:
      - barbell
      - rack
      - plates
    effort: high
    bilateral: true
    movement_patterns:
      - vertical_push
      - ballistic
      - olympic_lift
    requires:
      - push_press
    unlocks:
      - split_jerk
    contraindicated_with:
      - shoulder_impingement
      - shoulder_instability
      - knee_meniscus_post_op
      - ankle_sprain
      - wrist_injury
    progressions:
      load: add_2.5_5kg_per_session
      volume: add_sets
      complexity: split_jerk
    scaling_down:
      - push_press
      - strict_press
    typical_volume:
      sets: 5
      reps: 2
    sources:
      - Horsemen
      - Gym Jones
    notes: >
      Drive bar overhead then dip under into quarter squat to catch. Horsemen Olympic
      Day features jerk in wave patterns (3r/2r/1r) at 80–90%. Tests 1RM in Horsemen
      power benchmarks.

  - id: split_jerk
    name: Split Jerk
    category: barbell
    modality:
      - power
      - max_strength
    equipment:
      - barbell
      - rack
      - plates
    effort: max
    bilateral: false
    movement_patterns:
      - vertical_push
      - ballistic
      - olympic_lift
    requires:
      - push_jerk
    unlocks: []
    contraindicated_with:
      - shoulder_impingement
      - shoulder_instability
      - knee_meniscus_post_op
      - hip_flexor_strain
      - ankle_sprain
      - wrist_injury
    progressions:
      load: add_2.5kg_per_session
      volume: add_sets
    scaling_down:
      - push_jerk
      - push_press
    typical_volume:
      sets: 5
      reps: 2
    sources:
      - Horsemen
    notes: >
      Drive bar overhead and split legs into lunge position to receive. Most technically
      demanding jerk variant. Bilateral is false because each repetition uses an
      asymmetric split stance. Horsemen tests 1RM split jerk.

  - id: barbell_row
    name: Barbell Row (Bent Over)
    category: barbell
    modality:
      - max_strength
      - strength_endurance
    equipment:
      - barbell
      - plates
    effort: medium
    bilateral: true
    movement_patterns:
      - horizontal_pull
      - hip_hinge
    requires:
      - deadlift
      - bracing_mechanics
    unlocks:
      - pendlay_row
    contraindicated_with:
      - lumbar_disc
      - hip_flexor_strain
      - tennis_elbow
      - golfers_elbow
    progressions:
      load: add_2.5_5kg_per_session
      volume: progress_3x5_to_5x5
      complexity: pendlay_row
    scaling_down:
      - kb_row_single
    typical_volume:
      sets: 3
      reps: 5
    sources:
      - Starting Strength
      - Gym Jones
      - Horsemen
    notes: >
      Featured in the Gym Jones / Horsemen Six-Way Barbell Complex (6 reps).
      Starting Strength uses as the primary horizontal pull for novice programming.
      Hip-hinged torso roughly parallel to floor; bar pulled into lower chest.

  - id: pendlay_row
    name: Pendlay Row
    category: barbell
    modality:
      - max_strength
      - power
    equipment:
      - barbell
      - plates
    effort: high
    bilateral: true
    movement_patterns:
      - horizontal_pull
      - hip_hinge
      - ballistic
    requires:
      - barbell_row
      - deadlift
    unlocks: []
    contraindicated_with:
      - lumbar_disc
      - hip_flexor_strain
      - tennis_elbow
      - golfers_elbow
    progressions:
      load: add_2.5_5kg_per_session
      volume: add_sets
    scaling_down:
      - barbell_row
    typical_volume:
      sets: 5
      reps: 3
    sources:
      - Starting Strength
    notes: >
      Bar returns to floor each rep (dead-stop). Torso parallel to floor, explosive
      pull. Removes momentum from barbell row and demands greater power per rep.
      Named for Glenn Pendlay.

  - id: power_clean
    name: Power Clean
    category: barbell
    modality:
      - power
      - max_strength
    equipment:
      - barbell
      - plates
    effort: high
    bilateral: true
    movement_patterns:
      - hip_hinge
      - olympic_lift
      - ballistic
    requires:
      - hip_hinge
      - deadlift
    unlocks:
      - hang_power_clean
      - squat_clean
      - hang_squat_clean
      - barbell_complex
    contraindicated_with:
      - lumbar_disc
      - wrist_injury
      - shoulder_instability
      - hip_flexor_strain
    progressions:
      load: add_2.5_5kg_per_session
      volume: progress_3x3_to_5x3
      complexity: squat_clean
    scaling_down:
      - hang_power_clean
      - deadlift
    typical_volume:
      sets: 5
      reps: 3
    sources:
      - Starting Strength
      - Gym Jones
      - Horsemen
    notes: >
      Starting Strength programs 1×5 power clean as the primary upper-back and power
      movement on alternate days. Gym Jones references clean triplets (EMOM 10 min).
      Horsemen Olympic Day programs cleans in wave patterns at 80–90%.

  - id: hang_power_clean
    name: Hang Power Clean
    category: barbell
    modality:
      - power
      - strength_endurance
    equipment:
      - barbell
      - plates
    effort: high
    bilateral: true
    movement_patterns:
      - hip_hinge
      - olympic_lift
      - ballistic
    requires:
      - power_clean
    unlocks:
      - hang_squat_clean
    contraindicated_with:
      - lumbar_disc
      - wrist_injury
      - shoulder_instability
    progressions:
      load: add_2.5kg_per_session
      volume: add_sets
      complexity: hang_squat_clean
    scaling_down:
      - power_clean
    typical_volume:
      sets: 5
      reps: 3
    sources:
      - Gym Jones
      - Horsemen
    notes: >
      Pull initiates from hang position (above knee). Removes the first pull from
      the floor, emphasizing the hip snap and turnover. Featured in Horsemen
      "Purple Church" EMOM (3 power clean + 3 hang squat clean + 3 push press).

  - id: squat_clean
    name: Squat Clean
    category: barbell
    modality:
      - power
      - max_strength
    equipment:
      - barbell
      - plates
    effort: max
    bilateral: true
    movement_patterns:
      - hip_hinge
      - squat
      - olympic_lift
      - ballistic
    requires:
      - power_clean
      - front_squat
    unlocks:
      - hang_squat_clean
    contraindicated_with:
      - knee_meniscus_post_op
      - lumbar_disc
      - wrist_injury
      - shoulder_instability
      - hip_flexor_strain
      - ankle_sprain
    progressions:
      load: add_2.5kg_per_session
      volume: progress_3x2_to_5x2
    scaling_down:
      - power_clean
      - front_squat
    typical_volume:
      sets: 5
      reps: 2
    sources:
      - Horsemen
      - Gym Jones
    notes: >
      Full clean receiving the bar in a full squat. Highest expression of the clean
      movement. Demands front rack mobility, squat depth, and fast footwork.
      Horsemen Olympic Day programs at 80–90% in wave patterns.

  - id: hang_squat_clean
    name: Hang Squat Clean
    category: barbell
    modality:
      - power
      - strength_endurance
    equipment:
      - barbell
      - plates
    effort: max
    bilateral: true
    movement_patterns:
      - hip_hinge
      - squat
      - olympic_lift
      - ballistic
    requires:
      - hang_power_clean
      - squat_clean
    unlocks: []
    contraindicated_with:
      - knee_meniscus_post_op
      - lumbar_disc
      - wrist_injury
      - shoulder_instability
      - hip_flexor_strain
      - ankle_sprain
    progressions:
      load: add_2.5kg_per_session
      volume: add_sets
    scaling_down:
      - hang_power_clean
      - squat_clean
    typical_volume:
      sets: 5
      reps: 2
    sources:
      - Horsemen
    notes: >
      Horsemen "Purple Church" EMOM uses hang squat clean in a triplet sequence.
      Combines the limited range-of-motion pull with a full receiving squat.
      Highly metabolic; used in conditioning-strength hybrid sessions.

  - id: power_snatch
    name: Power Snatch
    category: barbell
    modality:
      - power
      - max_strength
    equipment:
      - barbell
      - plates
    effort: high
    bilateral: true
    movement_patterns:
      - hip_hinge
      - olympic_lift
      - ballistic
      - vertical_push
    requires:
      - power_clean
      - bracing_mechanics
    unlocks:
      - hang_power_snatch
      - snatch
      - overhead_squat
    contraindicated_with:
      - shoulder_impingement
      - shoulder_instability
      - lumbar_disc
      - wrist_injury
      - hip_flexor_strain
    progressions:
      load: add_2.5kg_per_session
      volume: progress_3x2_to_5x2
      complexity: snatch
    scaling_down:
      - power_clean
      - overhead_squat
    typical_volume:
      sets: 5
      reps: 2
    sources:
      - Gym Jones
      - Horsemen
    notes: >
      Bar pulled from floor to overhead lockout, receiving above parallel.
      Horsemen Olympic Day ("Snatch Your Face") programs snatch at 80–90% in waves.
      Prerequisite to full snatch; builds the hip-to-overhead pathway.

  - id: hang_power_snatch
    name: Hang Power Snatch
    category: barbell
    modality:
      - power
      - strength_endurance
    equipment:
      - barbell
      - plates
    effort: high
    bilateral: true
    movement_patterns:
      - hip_hinge
      - olympic_lift
      - ballistic
      - vertical_push
    requires:
      - power_snatch
    unlocks:
      - snatch
    contraindicated_with:
      - shoulder_impingement
      - shoulder_instability
      - lumbar_disc
      - wrist_injury
    progressions:
      load: add_2.5kg_per_session
      volume: add_sets
      complexity: snatch
    scaling_down:
      - power_snatch
    typical_volume:
      sets: 5
      reps: 2
    sources:
      - Horsemen
      - Gym Jones
    notes: >
      Initiates from hang position above the knee. Removes the floor pull and isolates
      the second pull and turnover. Useful for coaching overhead position and hip
      extension timing without the complexity of the full first pull.

  - id: snatch
    name: Snatch
    category: barbell
    modality:
      - power
      - max_strength
      - movement_skill
    equipment:
      - barbell
      - plates
    effort: max
    bilateral: true
    movement_patterns:
      - hip_hinge
      - squat
      - olympic_lift
      - ballistic
      - vertical_push
    requires:
      - power_snatch
      - overhead_squat
    unlocks: []
    contraindicated_with:
      - shoulder_impingement
      - shoulder_instability
      - knee_meniscus_post_op
      - lumbar_disc
      - wrist_injury
      - hip_flexor_strain
      - ankle_sprain
    progressions:
      load: add_2.5kg_per_session
      volume: progress_3x2_to_5x2
    scaling_down:
      - power_snatch
      - hang_power_snatch
      - overhead_squat
    typical_volume:
      sets: 5
      reps: 2
    sources:
      - Horsemen
      - Gym Jones
    notes: >
      Full Olympic snatch: bar from floor to overhead in one movement, receiving in a
      full squat. Most technically demanding barbell movement. Horsemen programs at
      80–90% in wave patterns. Tests 1RM for power benchmarks.

  - id: good_morning
    name: Good Morning
    category: barbell
    modality:
      - max_strength
      - durability
