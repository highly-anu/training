exercises:

  - id: push_up
    name: Push-Up
    category: bodyweight
    modality:
      - relative_strength
      - strength_endurance
    equipment:
      - none
    effort: medium
    bilateral: true
    movement_patterns:
      - horizontal_push
    requires: []
    unlocks:
      - push_up_ring
      - push_up_clapping
      - push_up_archer
    contraindicated_with:
      - wrist_injury
      - shoulder_impingement
    progressions:
      volume: increase_reps_per_set
      complexity: push_up_ring
    scaling_down: []
    typical_volume:
      sets: 4
      reps: 15
    sources:
      - CrossFit
      - Gym Jones
    notes: >
      Foundation horizontal push. Cue: full lockout at top, chest to floor at
      bottom, elbows at 45 degrees. Scale up via ring, archer, or clapping
      variants. Gym Jones programs 200+ reps in Murph-style sessions.

  - id: push_up_ring
    name: Push-Up (Rings)
    category: bodyweight
    modality:
      - relative_strength
      - movement_skill
    equipment:
      - rings
    effort: high
    bilateral: true
    movement_patterns:
      - horizontal_push
    requires:
      - push_up
    unlocks:
      - muscle_up_ring
    contraindicated_with:
      - wrist_injury
      - shoulder_impingement
      - shoulder_instability
    progressions:
      volume: increase_reps_per_set
      complexity: muscle_up_ring
    scaling_down:
      - push_up
    typical_volume:
      sets: 3
      reps: 10
    sources:
      - CrossFit
      - Ido Portal
    notes: >
      Rings demand active shoulder stabilization throughout the press. Turn
      rings out at lockout (RTO). Significant recruitment of pec minor, serratus
      anterior, and rotator cuff relative to bar push-up.

  - id: push_up_clapping
    name: Push-Up (Clapping)
    category: bodyweight
    modality:
      - power
      - relative_strength
    equipment:
      - none
    effort: high
    bilateral: true
    movement_patterns:
      - horizontal_push
      - ballistic
    requires:
      - push_up
    unlocks: []
    contraindicated_with:
      - wrist_injury
      - shoulder_impingement
    progressions:
      volume: increase_reps_per_set
      complexity: push_up_archer
    scaling_down:
      - push_up
    typical_volume:
      sets: 4
      reps: 6
    sources:
      - CrossFit
    notes: >
      Plyometric push-up variant. Emphasises rate of force development in the
      horizontal push. Cue: explosive concentric to generate airtime; controlled
      landing. Do not programme when fatigued — wrist/shoulder injury risk.

  - id: push_up_archer
    name: Push-Up (Archer)
    category: bodyweight
    modality:
      - relative_strength
    equipment:
      - none
    effort: high
    bilateral: false
    movement_patterns:
      - horizontal_push
    requires:
      - push_up
    unlocks:
      - pistol_squat
    contraindicated_with:
      - wrist_injury
      - shoulder_impingement
    progressions:
      volume: increase_reps_per_set
      complexity: push_up_ring
    scaling_down:
      - push_up
    typical_volume:
      sets: 3
      reps: 5
    sources:
      - Ido Portal
    notes: >
      Unilateral loading progression toward one-arm push-up. Wide stance;
      working arm bends fully, assisting arm extends laterally with minimal
      weight-bearing. Each side trained independently.

  - id: pull_up
    name: Pull-Up (Overhand)
    category: bodyweight
    modality:
      - relative_strength
      - strength_endurance
    equipment:
      - pull_up_bar
    effort: medium
    bilateral: true
    movement_patterns:
      - vertical_pull
    requires:
      - dead_hang
      - scapular_control
    unlocks:
      - pull_up_weighted
      - muscle_up_bar
      - pull_up_ring
    contraindicated_with:
      - shoulder_instability
      - shoulder_impingement
    progressions:
      volume: increase_reps_per_set
      load: add_weight_vest
      complexity: pull_up_weighted
    scaling_down:
      - dead_hang
    typical_volume:
      sets: 5
      reps: 5
    sources:
      - CrossFit
      - Gym Jones
    notes: >
      Pronated grip, full hang to chin over bar. Gym Jones programs pull-up
      ladders (1-2-3-4-5-6 per set) accumulating 50+ reps. CrossFit benchmark
      Murph: 100 reps. Prerequisite dead_hang ensures shoulder stability under
      passive load before active pulling.

  - id: chin_up
    name: Chin-Up (Supinated)
    category: bodyweight
    modality:
      - relative_strength
      - strength_endurance
    equipment:
      - pull_up_bar
    effort: medium
    bilateral: true
    movement_patterns:
      - vertical_pull
    requires:
      - dead_hang
      - scapular_control
    unlocks:
      - pull_up_weighted
    contraindicated_with:
      - shoulder_instability
      - elbow_tendinopathy
    progressions:
      volume: increase_reps_per_set
      load: add_weight_vest
      complexity: pull_up_weighted
    scaling_down:
      - dead_hang
    typical_volume:
      sets: 4
      reps: 6
    sources:
      - CrossFit
      - Gym Jones
    notes: >
      Supinated grip increases biceps contribution; generally accessible for
      beginners due to stronger elbow flexor line. Useful substitute when
      pronated pull-up volume is high to reduce elbow fatigue.

  - id: pull_up_weighted
    name: Pull-Up (Weighted)
    category: bodyweight
    modality:
      - max_strength
      - relative_strength
    equipment:
      - pull_up_bar
    effort: high
    bilateral: true
    movement_patterns:
      - vertical_pull
    requires:
      - pull_up
    unlocks:
      - muscle_up_bar
    contraindicated_with:
      - shoulder_instability
      - shoulder_impingement
    progressions:
      load: add_5kg_per_cycle
      volume: add_sets
    scaling_down:
      - pull_up
    typical_volume:
      sets: 5
      reps: 3
    sources:
      - Gym Jones
    notes: >
      Belt, vest, or dumbbell between knees. Primary strength developer for
      vertical pull. Gym Jones references adding load as the primary progression
      for the pull (reduce rest periods secondary).

  - id: pull_up_ring
    name: Pull-Up (Rings)
    category: bodyweight
    modality:
      - relative_strength
      - movement_skill
    equipment:
      - rings
    effort: high
    bilateral: true
    movement_patterns:
      - vertical_pull
    requires:
      - pull_up
    unlocks:
      - muscle_up_ring
    contraindicated_with:
      - shoulder_instability
      - shoulder_impingement
    progressions:
      volume: increase_reps_per_set
      complexity: muscle_up_ring
    scaling_down:
      - pull_up
    typical_volume:
      sets: 4
      reps: 5
    sources:
      - CrossFit
      - Ido Portal
    notes: >
      Rings allow natural rotation of the forearm throughout the pull. Higher
      stabiliser demand than bar. Turn rings out at the top for full shoulder
      pack. Prerequisite for ring muscle-up.

  - id: dip
    name: Dip (Bar / Parallel Bars)
    category: bodyweight
    modality:
      - relative_strength
      - strength_endurance
    equipment:
      - parallettes
    effort: medium
    bilateral: true
    movement_patterns:
      - vertical_push
    requires: []
    unlocks:
      - dip_ring
      - muscle_up_bar
    contraindicated_with:
      - shoulder_impingement
      - shoulder_instability
      - wrist_injury
    progressions:
      volume: increase_reps_per_set
      load: add_weight_vest
      complexity: dip_ring
    scaling_down: []
    typical_volume:
      sets: 4
      reps: 10
    sources:
      - CrossFit
      - Gym Jones
    notes: >
      Shoulder-width grip on bars or parallel bars. Slight forward lean loads
      chest; upright torso emphasises triceps. Full range: shoulder below elbow
      at bottom. CrossFit benchmark Elizabeth uses ring dips.

  - id: dip_ring
    name: Dip (Rings)
    category: bodyweight
    modality:
      - relative_strength
      - movement_skill
    equipment:
      - rings
    effort: high
    bilateral: true
    movement_patterns:
      - vertical_push
    requires:
      - dip
    unlocks:
      - muscle_up_ring
    contraindicated_with:
      - shoulder_impingement
      - shoulder_instability
      - wrist_injury
    progressions:
      volume: increase_reps_per_set
      complexity: muscle_up_ring
    scaling_down:
      - dip
    typical_volume:
      sets: 3
      reps: 8
    sources:
      - CrossFit
    notes: >
      Turn rings out (RTO) at lockout. Greater pectoralis minor and serratus
      demand than bar dip. CrossFit benchmark Elizabeth programs ring dips as a
      primary movement.

  - id: handstand_hold
    name: Handstand Hold (Wall)
    category: bodyweight
    modality:
      - relative_strength
      - movement_skill
    equipment:
      - none
    effort: medium
    bilateral: true
    movement_patterns:
      - vertical_push
      - isometric
    requires:
      - wrist_prep
      - shoulder_stability
    unlocks:
      - handstand_push_up
    contraindicated_with:
      - wrist_injury
      - shoulder_impingement
    progressions:
      volume: increase_duration
      complexity: handstand_push_up
    scaling_down: []
    typical_volume:
      sets: 3
      duration_sec: 30
    sources:
      - CrossFit
      - Ido Portal
    notes: >
      Chest-to-wall or back-to-wall hold. Active shoulders — push floor away,
      protract scapulae. Foundation for HSPU. Ido Portal treats inversion
      practice as a daily movement habit.

  - id: handstand_push_up
    name: Handstand Push-Up (Wall)
    category: bodyweight
    modality:
      - relative_strength
      - max_strength
    equipment:
      - none
    effort: high
    bilateral: true
    movement_patterns:
      - vertical_push
    requires:
      - handstand_hold
    unlocks:
      - handstand_push_up_ring
    contraindicated_with:
      - wrist_injury
      - shoulder_impingement
      - shoulder_instability
    progressions:
      volume: increase_reps_per_set
      complexity: handstand_push_up_ring
    scaling_down:
      - handstand_hold
    typical_volume:
      sets: 4
      reps: 5
    sources:
      - CrossFit
      - Gym Jones
    notes: >
      Chest-to-wall kick-up. Head to floor at bottom; full lockout at top.
      Deficit HSPU (hands on parallettes) increases range of motion and
      difficulty. Kipping variant increases volume capacity for metabolic
      conditioning; strict variant is primary strength developer.

  - id: handstand_push_up_ring
    name: Handstand Push-Up (Rings)
    category: bodyweight
    modality:
      - relative_strength
      - max_strength
      - movement_skill
    equipment:
      - rings
    effort: max
    bilateral: true
    movement_patterns:
      - vertical_push
    requires:
      - handstand_push_up
      - dip_ring
    unlocks: []
    contraindicated_with:
      - wrist_injury
      - shoulder_impingement
      - shoulder_instability
    progressions:
      volume: increase_reps_per_set
    scaling_down:
      - handstand_push_up
    typical_volume:
      sets: 3
      reps: 3
    sources:
      - Ido Portal
    notes: >
      Extreme stability demand. Rings set low; athlete kicks to inverted and
      controls descent onto rings. Requires total shoulder stability and
      considerable proprioception. Ido Portal advanced ring work.

  - id: muscle_up_bar
    name: Muscle-Up (Bar)
    category: bodyweight
    modality:
      - relative_strength
      - power
    equipment:
      - pull_up_bar
    effort: max
    bilateral: true
    movement_patterns:
      - vertical_pull
      - vertical_push
    requires:
      - pull_up
      - dip
    unlocks: []
    contraindicated_with:
      - shoulder_instability
      - shoulder_impingement
    progressions:
      volume: increase_reps_per_set
      complexity: muscle_up_ring
    scaling_down:
      - pull_up
      - dip
    typical_volume:
      sets: 3
      reps: 3
    sources:
      - CrossFit
    notes: >
      Explosive pull through and above bar transitioning to dip lockout. Strict
      variant demands significant lat, biceps, and triceps power. High injury
      risk if kipping without adequate strict strength base. Do not programme
      with active shoulder_instability flag.

  - id: muscle_up_ring
    name: Muscle-Up (Rings)
    category: bodyweight
    modality:
      - relative_strength
      - power
      - movement_skill
    equipment:
      - rings
    effort: max
    bilateral: true
    movement_patterns:
      - vertical_pull
      - vertical_push
    requires:
      - pull_up_ring
      - dip_ring
    unlocks: []
    contraindicated_with:
      - shoulder_instability
      - shoulder_impingement
    progressions:
      volume: increase_reps_per_set
    scaling_down:
      - pull_up_ring
      - dip_ring
    typical_volume:
      sets: 3
      reps: 3
    sources:
      - CrossFit
    notes: >
      Transition from below rings to support position in a single movement. The
      false grip enables a smooth pull-to-press transition. CrossFit benchmark
      movement. Higher shoulder demand than bar variant due to free rotation.

  - id: plank_hold
    name: Plank Hold (FLR — Front Leaning Rest)
    category: bodyweight
    modality:
      - durability
      - strength_endurance
    equipment:
      - none
    effort: low
    bilateral: true
    movement_patterns:
      - isometric
    requires: []
    unlocks:
      - side_plank
    contraindicated_with:
      - wrist_injury
    progressions:
      volume: increase_duration
      load: add_weight_vest
    scaling_down: []
    typical_volume:
      sets: 3
      duration_sec: 60
    sources:
      - Gym Jones
      - CrossFit
    notes: >
      Gym Jones programs 300-second accumulated FLR (Front Leaning Rest) as a
      core and shoulder endurance component. Maintain neutral spine; do not
      allow hip sag. Progress toward 5 continuous minutes before loading.

  - id: side_plank
    name: Side Plank Hold
    category: bodyweight
    modality:
      - durability
      - rehab
    equipment:
      - none
    effort: low
    bilateral: false
    movement_patterns:
      - isometric
    requires:
      - plank_hold
    unlocks: []
    contraindicated_with:
      - wrist_injury
    progressions:
      volume: increase_duration
    scaling_down:
      - plank_hold
    typical_volume:
      sets: 3
      duration_sec: 45
    sources:
      - CrossFit
    notes: >
      Lateral core anti-lateral flexion demand. Elbow or hand variant. Used in
      Marcus Filly shoulder rehab protocols for lat activation. Train each side
      independently.

  - id: sit_up
    name: Sit-Up (Abmat)
    category: bodyweight
    modality:
      - strength_endurance
    equipment:
      - none
    effort: low
    bilateral: true
    movement_patterns:
      - hip_flexion
    requires: []
    unlocks:
      - l_sit
    contraindicated_with:
      - lumbar_disc_pathology
    progressions:
      volume: increase_reps_per_set
      complexity: l_sit
    scaling_down: []
    typical_volume:
      sets: 3
      reps: 20
    sources:
      - CrossFit
      - Gym Jones
    notes: >
      CrossFit benchmark Annie: 50-40-30-20-10 sit-ups. Gym Jones uses in
      accumulation days as high-rep core work. Anchored foot variant increases
      hip flexor contribution; abmat allows full lumbar extension at bottom.

  - id: l_sit
    name: L-Sit (Parallettes or Floor)
    category: bodyweight
    modality:
      - relative_strength
      - movement_skill
    equipment:
      - parallettes
    effort: high
    bilateral: true
    movement_patterns:
      - isometric
      - hip_flexion
    requires:
      - sit_up
      - tuck_sit
    unlocks: []
    contraindicated_with:
      - wrist_injury
      - hip_flexor_strain
    progressions:
      volume: increase_duration
    scaling_down:
      - tuck_sit
    typical_volume:
      sets: 4
      duration_sec: 10
    sources:
      - CrossFit
      - Ido Portal
    notes: >
      Full hip flexion hold with straight legs, locked elbows, depressed
      scapulae. Accumulate time in hold; 60 sec total volume is a reasonable
      benchmark. Ido Portal uses as baseline compression strength indicator.

  - id: tuck_sit
    name: Tuck Sit (Parallettes or Floor)
    category: bodyweight
    modality:
      - relative_strength
      - movement_skill
    equipment:
      - parallettes
    effort: medium
    bilateral: true
    movement_patterns:
      - isometric
    requires: []
    unlocks:
      - l_sit
    contraindicated_with:
      - wrist_injury
    progressions:
      volume: increase_duration
      complexity: l_sit
    scaling_down: []
    typical_volume:
      sets: 4
      duration_sec: 15
    sources:
      - Ido Portal
    notes: >
      Knees tucked to chest in supported hold. Regression of L-sit. Develops
      scapular depression strength and hip flexor compression. Ido Portal
      prescribes as a daily practice movement.

  - id: squat_air
    name: Air Squat
    category: bodyweight
    modality:
      - movement_skill
      - strength_endurance
    equipment:
      - none
    effort: low
    bilateral: true
    movement_patterns:
      - squat
    requires: []
    unlocks:
      - squat_jump
      - pistol_squat
    contraindicated_with:
      - knee_meniscus_post_op
    progressions:
      volume: increase_reps_per_set
      complexity: squat_jump
    scaling_down: []
    typical_volume:
      sets: 3
      reps: 20
    sources:
      - CrossFit
      - Gym Jones
    notes: >
      CrossFit fundamental movement. Rippetoe squatting standards apply: below
      parallel, neutral spine, heels flat. Gym Jones warm-up protocol: 2×5 wall
      squats then 2×10 air squats before loading. Chelsea benchmark: 15 squats
      per minute EMOM 30 min.

  - id: squat_jump
    name: Jump Squat
    category: bodyweight
    modality:
      - power
      - anaerobic_intervals
    equipment:
      - none
    effort: high
    bilateral: true
    movement_patterns:
      - squat
      - ballistic
    requires:
      - squat_air
    unlocks: []
    contraindicated_with:
      - knee_meniscus_post_op
      - patellar_tendinopathy
      - achilles_tendinopathy
    progressions:
      volume: increase_reps_per_set
      load: add_weight_vest
    scaling_down:
      - squat_air
    typical_volume:
      sets: 4
      reps: 10
    sources:
      - CrossFit
      - Gym Jones
    notes: >
      Squat to full depth then explode vertically. Land soft, reabsorb through
      hip/knee/ankle. Gym Jones programs tuck jumps and split jumps as variants.
      High-impact; contraindicated post knee surgery.

  - id: pistol_squat
    name: Pistol Squat (Single-Leg Squat)
    category: bodyweight
    modality:
      - relative_strength
      - movement_skill
    equipment:
      - none
    effort: high
    bilateral: false
    movement_patterns:
      - squat
    requires:
      - squat_air
      - single_leg_balance
    unlocks: []
    contraindicated_with:
      - knee_meniscus_post_op
      - patellar_tendinopathy
    progressions:
      volume: increase_reps_per_set
      load: add_weight_vest
    scaling_down:
      - squat_air
    typical_volume:
      sets: 3
      reps: 5
    sources:
      - CrossFit
      - Ido Portal
    notes: >
      Single-leg squat to full depth with opposite leg extended forward. High
      demand on hip flexor strength and ankle dorsiflexion mobility. Gym Jones
      single-leg squat on 18–20" box is the primary regression.

  - id: lunge
    name: Walking Lunge
    category: bodyweight
    modality:
      - strength_endurance
      - movement_skill
    equipment:
      - none
    effort: medium
    bilateral: false
    movement_patterns:
      - squat
      - locomotion
    requires: []
    unlocks:
      - lunge_jumping
      - lunge_overhead
    contraindicated_with:
      - knee_meniscus_post_op
      - patellar_tendinopathy
    progressions:
      volume: increase_reps_per_set
      load: add_weight_vest
      complexity: lunge_overhead
    scaling_down: []
    typical_volume:
      sets: 3
      reps: 20
    sources:
      - CrossFit
      - Gym Jones
    notes: >
      Alternating legs, stepping forward. Knee tracks over foot, front shin
      near-vertical. Gym Jones programs 2×20m walking lunges in single-leg
      accessory work. Bodyweight version is the baseline; progress to
      overhead or weighted variants.

  - id: lunge_jumping
    name: Split Jump Lunge
    category: bodyweight
    modality:
      - power
      - anaerobic_intervals
    equipment:
      - none
    effort: high
    bilateral: false
    movement_patterns:
      - squat
      - ballistic
      - locomotion
    requires:
      - lunge
    unlocks: []
    contraindicated_with:
      - knee_meniscus_post_op
      - patellar_tendinopathy
      - achilles_tendinopathy
    progressions:
      volume: increase_reps_per_set
    scaling_down:
      - lunge
    typical_volume:
      sets: 4
      reps: 10
    sources:
      - Gym Jones
    notes: >
      Plyometric lunge: explosive vertical jump from split stance, switch legs
      mid-air. High metabolic and power demand. Gym Jones references split jumps
      in lower body power circuits.

  - id: lunge_overhead
    name: Overhead Lunge
    category: bodyweight
    modality:
      - relative_strength
      - durability
    equipment:
      - none
    effort: medium
    bilateral: false
    movement_patterns:
      - squat
      - vertical_push
      - locomotion
    requires:
      - lunge
      - shoulder_stability
    unlocks: []
    contraindicated_with:
      - knee_meniscus_post_op
      - shoulder_impingement
      - wrist_injury
    progressions:
      load: add_weight_overhead
      volume: increase_reps_per_set
    scaling_down:
      - lunge
    typical_volume:
      sets: 3
      reps: 12
    sources:
      - CrossFit
      - Gym Jones
    notes: >
      Arms locked overhead with weight or simply arms raised. Gymn Jones
      programs 45lb bar overhead during 400m lunge walks as a power-endurance
      challenge. Without load this is a mobility and stability developer.

  - id: burpee
    name: Burpee
    category: bodyweight
    modality:
      - mixed_modal_conditioning
      - anaerobic_intervals
      - strength_endurance
    equipment:
      - none
    effort: high
    bilateral: true
    movement_patterns:
      - horizontal_push
      - squat
      - locomotion
    requires: []
    unlocks: []
    contraindicated_with:
      - wrist_injury
      - shoulder_impingement
      - knee_meniscus_post_op
    progressions:
      volume: increase_reps_per_set
    scaling_down: []
    typical_volume:
      sets: 1
      reps: 60
    sources:
      - CrossFit
      - Gym Jones
    notes: >
      Gym Jones accumulation day benchmark: 60 burpees as final element of
      "Those Burpees Suck" circuit. High metabolic cost, full-body demand.
      Standard: chest-to-floor, jump-and-clap overhead at top.

  - id: dead_hang
    name: Dead Hang
    category: bodyweight
    modality:
      - durability
      - rehab
    equipment:
      - pull_up_bar
    effort: low
    bilateral: true
    movement_patterns:
      - vertical_pull
      - isometric
    requires: []
    unlocks:
      - pull_up
      - chin_up
    contraindicated_with:
      - shoulder_instability
    progressions:
      volume: increase_duration
    scaling_down: []
    typical_volume:
      sets: 3
      duration_sec: 60
    sources:
      - Gym Jones
      - CrossFit
    notes: >
      Passive hang, shoulders fully elevated (shrug into ears) or active
      (scapular depression). Gym Jones programs 300-second accumulated dead
      hang on accumulation days. Decompresses spine; builds grip and shoulder
      passive stability prerequisite for pulling movements.

  - id: rope_climb
    name: Rope Climb
    category: bodyweight
    modality:
      - relative_strength
      - mixed_modal_conditioning
    equipment:
      - rope
    effort: high
    bilateral: true
    movement_patterns:
      - vertical_pull
    requires:
      - pull_up
    unlocks: []
    contraindicated_with:
      - shoulder_instability
      - shoulder_impingement
    progressions:
      volume: add_sets
      complexity: rope_climb
    scaling_down:
      - pull_up
    typical_volume:
      sets: 5
      reps: 1
    sources:
      - CrossFit
    notes: >
      15-foot standard height (CrossFit). Legless variant eliminates lower-body
      assistance and dramatically increases upper-body demand. Rope climb scores
      high on lat/biceps activation and grip endurance. Foot-assisted technique
      for conditioning; legless for strength.

