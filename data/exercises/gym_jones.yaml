exercises:

  - id: wall_squat
    name: Wall Squat (Mobility Drill)
    category: mobility
    modality:
      - mobility
    equipment:
      - none
    effort: low
    bilateral: true
    movement_patterns:
      - squat
    requires: []
    unlocks:
      - single_leg_squat_box
    contraindicated_with: []
    progressions:
      depth: increase_range_of_motion
    scaling_down: []
    typical_volume:
      sets: 3
      reps: 5
    sources:
      - Gym Jones
    notes: >
      Gym Jones warm-up staple used in virtually every strength and circuit session.
      Stand with toes touching a wall, feet wide. Drop into a squat with knees
      tracking toes; contact the wall with knees to enforce vertical shin position
      and upright torso. Hands brace against wall as needed. Builds ankle mobility,
      hip flexor opening, and thoracic extension. Not a strength exercise — a
      diagnostic and mobility drill. 2–3 sets of 5 before any lower body session.

  - id: single_leg_squat_box
    name: Single-Leg Squat (Box)
    category: bodyweight
    modality:
      - max_strength
      - relative_strength
    equipment:
      - open_space
    effort: high
    bilateral: false
    movement_patterns:
      - squat
    requires:
      - squat_pattern
    unlocks:
      - pistol_squat
    contraindicated_with:
      - knee_meniscus_post_op
      - patellar_tendinopathy
    progressions:
      volume: increase_sets
      complexity: lower_box_height
    scaling_down:
      - back_squat
    typical_volume:
      sets: 5
      reps: 5
    sources:
      - Gym Jones
    notes: >
      Standing on a 18–20 inch box, lower on one leg until the non-working heel
      touches the ground, then stand. Uses the box to limit depth and provide a
      proprioceptive endpoint — more accessible than a full pistol squat.
      Gym Jones Operator Fitness I and II primary single-leg strength exercise,
      performed 5×5. Eliminates assistance from the trailing leg. Builds posterior
      chain, quad, and hip stability for unilateral movement demands. Progress by
      lowering the box height toward full pistol range.

  - id: weighted_step_up
    name: Weighted Step-Up
    category: barbell
    modality:
      - max_strength
      - durability
    equipment:
      - barbell
      - plates
      - open_space
    effort: high
    bilateral: false
    movement_patterns:
      - squat
      - step_up
    requires:
      - squat_pattern
      - bracing_mechanics
    unlocks: []
    contraindicated_with:
      - knee_meniscus_post_op
      - patellar_tendinopathy
    progressions:
      load: add_5kg_per_session
      volume: increase_sets
    scaling_down:
      - single_leg_squat_box
    typical_volume:
      sets: 5
      reps: 2
    sources:
      - Gym Jones
    notes: >
      Barbell on back (or DBs at side), step up onto a 20-inch box. Eliminate all
      assistance from the trailing leg — this is a true single-leg lift.
      Gym Jones Operator Fitness prescription: work up to heavy single (95–135 lb)
      then perform 5×2 each side at that load, rest 60 sec between sets. Higher
      transfer to unilateral field demands (stairs, slopes, climbing) than bilateral
      squat alone. Emphasis on single-leg deployment fitness.

  - id: bear_crawl
    name: Bear Crawl
    category: bodyweight
    modality:
      - durability
      - mixed_modal_conditioning
    equipment:
      - open_space
    effort: medium
    bilateral: true
    movement_patterns:
      - locomotion
      - horizontal_push
    requires: []
    unlocks: []
    contraindicated_with:
      - wrist_injury
      - shoulder_impingement
    progressions:
      volume: increase_distance
      load: weighted_vest
    scaling_down:
      - plank_hold
    typical_volume:
      sets: 3
      distance_m: 20
    sources:
      - Gym Jones
    notes: >
      Quadruped locomotion — hips close to the ground, opposite limbs moving
      simultaneously. Gym Jones uses bear crawl in conditioning circuits and as
      a loaded carry accessory (DB bear crawl: hands on dumbbells, hop feet
      forward). Builds shoulder stability, hip flexor endurance, and total-body
      coordination. Weighted version: push DBs forward, hop feet up in plank
      position. Distance-based or time-based.

  - id: ring_support_hold
    name: Ring Support Hold (FLR on Rings)
    category: bodyweight
    modality:
      - relative_strength
      - durability
    equipment:
      - rings
    effort: medium
    bilateral: true
    movement_patterns:
      - isometric
      - vertical_push
    requires:
      - push_pattern
    unlocks: []
    contraindicated_with:
      - shoulder_impingement
      - shoulder_instability
      - wrist_injury
    progressions:
      volume: increase_duration
      complexity: turn_rings_out
    scaling_down:
      - plank_hold
    typical_volume:
      sets: 5
      duration_sec: 60
    sources:
      - Gym Jones
    notes: >
      Arms straight, rings turned out at bottom of dip position, body held in
      a tight plank. The ring instability dramatically increases rotator cuff
      and serratus anterior demand vs. fixed bar support. Gym Jones uses
      "300 seconds of FLR (Front Leaning Rest)" accumulated across sets as a
      core and shoulder endurance block. Target: 60 seconds per set × 5 sets.
      Turn rings out progressively to increase scapular stability demand.

  - id: kb_swing_breathing_ladder
    name: KB Swing Breathing Ladder (1-20-1)
    category: kettlebell
    modality:
      - strength_endurance
      - power
    equipment:
      - kettlebell
    effort: high
    bilateral: true
    movement_patterns:
      - hip_hinge
      - ballistic
    requires:
      - kb_swing_two_hand
      - bracing_mechanics
    unlocks: []
    contraindicated_with:
      - lumbar_disc_pathology
    progressions:
      load: increase_bell_weight
      volume: multiple_rounds
    scaling_down:
      - kb_swing_two_hand
    typical_volume:
      ladder_top: 20
      reps_total: 400
    sources:
      - Gym Jones
    notes: >
      Gym Jones breathing ladder protocol: perform 1 KB swing, take 1 breath, perform
      2 swings, take 2 breaths... climb to 20, then descend back to 1. Total: ~400
      swings. The breathing is the rest — breath count equals rep count, enforcing
      complete oxygen recovery between sets. KB weight: 24 kg (53 lb) for trained
      athletes. The breathing ladder develops extraordinary KB endurance and trains
      the ability to recover during work. Mark Twight: "The breathing ladder is a
      test of will as much as fitness." Warm up with the same bell at lower rep counts
      before starting the full ladder.
