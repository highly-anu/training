id: emom_strength
name: "EMOM Strength Wave (10×1)"
modality: max_strength
category: strength
duration_estimate_minutes: 55
required_equipment:
  - barbell
  - rack
  - plates
applicable_phases:
  - build
  - peak
  - taper
sources:
  - "Gym Jones"
  - "Horsemen"
notes: >
  Ten singles on the minute at 85–95% 1RM. Each interval is one rep; the remainder of
  the 60-second window is rest. This format accumulates near-maximal neural stimulus
  (10 singles = high CNS exposure) while total volume is low and fatigue is managed
  via the enforced rest window. Effective for peaking and for pushing a 1RM up without
  high injury risk from max-effort singles. Load can wave across intervals: e.g.,
  85/87/90/92/95/92/90/90/87/85%. Bar is loaded and staged before the clock starts.
  Typically follows a brief barbell warm-up; do not precede with heavy volume work.

slots:
  - role: primary_emom_lift
    slot_type: emom
    sets: 10
    reps: 1
    duration_sec: 60
    intensity: heavy
    intensity_pct_1rm: 0.90
    exercise_filter:
      category: barbell
      bilateral: true
    notes: >
      One rep per minute for 10 minutes. Default movement is back squat or deadlift.
      Load wave: start at 85%, build to 92–95% by set 5, descend to 85–87% by set 10.
      If any rep looks or feels poor, reduce load and hold there; no grinding.

  - role: barbell_warm_up
    slot_type: sets_reps
    sets: 3
    reps: 3
    intensity: light
    intensity_pct_1rm: 0.60
    rest_sec: 90
    exercise_filter:
      movement_pattern: squat
      category: barbell
      bilateral: true
    notes: "Three brief warm-up sets at 50–65% before the EMOM block. Keep reps crisp and fast."

  - role: accessory_pull
    slot_type: sets_reps
    sets: 3
    reps: 5
    intensity: moderate
    intensity_pct_1rm: 0.70
    rest_sec: 120
    exercise_filter:
      movement_pattern: hinge
      category: barbell
    notes: "Romanian deadlift or barbell row post-EMOM. Complements the primary lift pattern."

scaling:
  deload:
    volume_multiplier: 0.6
    intensity_pct: 0.9
    notes: "Reduce to 6 singles at 80–85%. Deload weeks should not include EMOM strength work if athlete is fatigued."
  time_limited:
    drop_slots:
      - accessory_pull
    notes: "Drop the post-EMOM accessory work. The EMOM block itself is the priority."
  equipment_limited:
    substitutions:
      - missing_equipment: rack
        substitute_approach: "Substitute trap bar deadlift EMOM. Cannot replicate back squat singles without rack."
