id: tgu_practice
name: "TGU Skill and Strength Practice"
modality: relative_strength
category: kettlebell
duration_estimate_minutes: 40
required_equipment:
  - kettlebell
applicable_phases:
  - base
  - build
  - peak
  - taper
  - deload
  - maintenance
  - rehab
sources:
  - "Wildman"
  - "RKC"
  - "Gym Jones"
  - "Horsemen"
notes: >
  Turkish Get-Up practice session — the full supine-to-standing movement with
  a kettlebell. The TGU is simultaneously a strength exercise, a movement skill
  drill, a shoulder stability test, and a rehabilitation tool. It appears across
  all source methodologies. Gym Jones uses TGU as core work (TGU 5×6 at 25 lb
  or 100× at 15 lb for volume/recovery). Horsemen uses TGU in descending ladders
  combined with runs. Wildman/RKC treats TGU as a prerequisite movement and a
  progression vehicle. Ido Portal would frame it as integrated full-body locomotion.
  Practice format: deliberate, slow, with pauses at each position to find stability.
  Each rep takes 45–90 seconds when done correctly. Do not rush. Two formats:
    1. Skill practice: 5 reps per side, heavy, 3–5 sets with long rest — strength focus
    2. Volume practice: 10+ reps per side at light load — recovery or conditioning focus

slots:
  - role: joint_prep
    slot_type: time_domain
    duration_sec: 300
    intensity: light
    notes: "5-min prep: wrist routine, shoulder rotation + stabilization, hip 90/90, and 3 slow bodyweight get-ups (no weight) to confirm pattern."

  - role: tgu_skill_sets
    slot_type: sets_reps
    sets: 5
    reps: 5
    intensity: moderate
    intensity_pct_1rm: 0.65
    rest_sec: 120
    exercise_filter:
      movement_pattern: tgu
      category: kettlebell
    notes: >
      5 sets × 5 reps per side (alternating, so 10 reps total per set). Working weight:
      approximately 65% of TGU max load. Pause at each position: supine press, tall sit,
      half-kneeling, standing. Lower as slowly as the ascent. Switch hands between reps.
      Gym Jones: 6 reps per set at 25 lb. Horsemen: 10 reps each shoulder at 80 lb sandbag
      is the volume endurance variant. Rest 120 sec between sets.

  - role: tgu_loaded_carry_pairing
    slot_type: for_time
    distance_m: 20
    intensity: moderate
    exercise_filter:
      movement_pattern: carry
      category: kettlebell
    notes: >
      After each TGU set: complete a 20m overhead KB carry (same bell, same hand) before
      setting down the bell. This links the get-up to the carry pattern and adds shoulder
      stability under movement. Optional — include when athlete has stable TGU technique.
      Drop this slot in early learning phase.

  - role: shoulder_mobility_cool_down
    slot_type: time_domain
    duration_sec: 300
    intensity: light
    notes: "5-min shoulder and thoracic cool-down: cross-body stretch, behind-the-back reach, scapula mobilization, doorway chest stretch."

scaling:
  deload:
    volume_multiplier: 0.6
    intensity_pct: 0.9
    notes: >
      Reduce to 3 sets × 3 reps per side. Drop load to 50% of TGU max. The TGU is
      well-suited to deload weeks — lighter load, deliberate pace, emphasis on quality.
      Gym Jones uses 100× TGU at 15 lb as a recovery-day format.
  time_limited:
    drop_slots:
      - tgu_loaded_carry_pairing
      - shoulder_mobility_cool_down
    notes: "Drop carry pairing and cool-down. Even 3 sets of TGU in 15 min delivers meaningful practice."
  equipment_limited:
    substitutions:
      - missing_equipment: kettlebell
        substitute_approach: "TGU can be performed with a dumbbell held by one end. Progression and balance feel differ slightly but the movement pattern is intact."
