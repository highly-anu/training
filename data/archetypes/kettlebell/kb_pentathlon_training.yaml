id: kb_pentathlon_training
name: "KB Pentathlon Training (6 min × 5 Exercises)"
modality: strength_endurance
category: kettlebell
duration_estimate_minutes: 70
required_equipment:
  - kettlebell
applicable_phases:
  - build
  - peak
sources:
  - "Wildman"
  - "RKC"
notes: >
  KB Pentathlon competition preparation. Five exercises performed for 6 minutes each
  with 5 minutes rest between exercises. The five exercises with target RPM standards:
    1. Cleans — 120 reps / 20 RPM
    2. Long cycle press (clean + press) — 60 reps / 10 RPM
    3. Jerks — 120 reps / 20 RPM
    4. Half snatch — 108 reps / 18 RPM
    5. Push press — 120 reps / 20 RPM
  Scoring: reps × bell weight coefficient (8 kg = 1.0, 12 kg = 1.5, 16 kg = 2.0,
  20 kg = 2.5, 24 kg = 3.0, 28 kg = 3.5). Wildman progression: begin with a bell
  weight where you can complete 80% of target reps, then build RPM to target before
  moving to heavier bell. Breathing mechanics are the ceiling — athlete must maintain
  controlled breathing to sustain RPM without technique breakdown.
  In training, exercises can be done in a single session (competition simulation) or
  2–3 exercises per session for volume accumulation. This archetype represents the
  full competition simulation format.

slots:
  - role: pentathlon_warm_up
    slot_type: time_domain
    duration_sec: 720
    intensity: light
    notes: >
      12-min KB warm-up circuit: 1 min per movement, no breaks, at light bell weight
      (approx 50% of training bell). Include: 1-arm swing R/L, figure-8, clean & press
      R/L, snatch R/L, push press R/L. Mirrors the Horsemen 12-min KB complex format.

  - role: cleans_block
    slot_type: time_domain
    duration_sec: 360
    intensity: moderate
    exercise_filter:
      movement_pattern: clean
      category: kettlebell
    notes: >
      6-min clean block. Target: 20 RPM = 120 reps. Alternating arm each minute or
      set-point switches (10 reps per arm before switch). Breathing: match breath to
      rep rhythm. Rest: 5 min active recovery (walk or light movement) before next block.

  - role: long_cycle_press_block
    slot_type: time_domain
    duration_sec: 360
    intensity: moderate
    exercise_filter:
      movement_pattern: clean
      category: kettlebell
    notes: >
      6-min clean + press (long cycle press) block. Target: 10 RPM = 60 reps. Lower
      RPM than cleans due to overhead press component. Strict press preferred for
      training quality; push press acceptable in competition. 5-min rest after block.

  - role: jerks_block
    slot_type: time_domain
    duration_sec: 360
    intensity: moderate
    exercise_filter:
      movement_pattern: jerk
      category: kettlebell
    notes: >
      6-min jerk block. Target: 20 RPM = 120 reps. Double KB jerk in competition;
      single KB jerk acceptable in training with alternating arms. Power output is
      higher here than in press — breathing pattern shifts to match the faster rhythm.
      5-min rest after block.

  - role: half_snatch_block
    slot_type: time_domain
    duration_sec: 360
    intensity: moderate
    exercise_filter:
      movement_pattern: swing
      category: kettlebell
    notes: >
      6-min half snatch block. Target: 18 RPM = 108 reps. Half snatch: swing
      trajectory + overhead, then drop back to swing (not full insertion). Alternating
      arms every 10 reps or by feel. 5-min rest after block.

  - role: push_press_block
    slot_type: time_domain
    duration_sec: 360
    intensity: moderate
    exercise_filter:
      movement_pattern: press
      category: kettlebell
    notes: >
      6-min push press block. Target: 20 RPM = 120 reps. Final block — athlete will
      be fatigued. Breathing mechanics are the limiter here; do not sacrifice technique
      for RPM in training. Maintain lat engagement and vertical forearm throughout.

scaling:
  deload:
    volume_multiplier: 0.6
    intensity_pct: 0.9
    notes: "Reduce each block to 4 minutes at 80% target RPM. Reduce bell weight one level. Do not run full competition simulation in deload weeks."
  time_limited:
    drop_slots:
      - push_press_block
      - half_snatch_block
    notes: "Drop push press first, then half snatch. Run 3-exercise training block (cleans + long cycle + jerks) for abbreviated sessions. Maintain 5-min rest between exercises."
  equipment_limited:
    substitutions:
      - missing_equipment: kettlebell
        substitute_approach: "Pentathlon is entirely KB-specific. No meaningful substitution exists. If only light KBs are available, adjust bell weight coefficient targets and increase RPM."
