id: max_strength_focus
name: Max Strength Focus
description: >
  For intermediate-to-advanced athletes whose primary objective is absolute
  strength development on the barbell lifts. Minimizes conditioning interference
  while maintaining movement quality and power expression. Suitable for
  powerlifting prep, strength sport competition, or a dedicated strength
  block before returning to concurrent training.

event_date: null

priorities:
  max_strength: 0.60
  power: 0.15
  strength_endurance: 0.15
  mobility: 0.10

primary_sources:
  - starting_strength
  - gym_jones
  - marcus_filly

phase_sequence:
  - phase: base
    weeks: 4
    focus: >
      Technical foundation and volume accumulation. 3×5 linear progression
      on squat, press, deadlift, bench. Establish movement quality and
      proprioception under load. Moderate accessory work (rows, pull-ups).
      Minimal conditioning (1×/week easy Zone 2 only, 30 min max). Daily
      joint prep and mobility.
  - phase: build
    weeks: 4
    focus: >
      Volume block. Transition to 5×5 and Heavy/Light/Medium structure.
      Introduce wave loading. Add power clean and push press for
      neural drive. Accessory volume increases (weighted pull-ups,
      dips, Romanian DL). KB ballistics 1×/week for power maintenance.
      Conditioning remains minimal — 1×/week Zone 2.
    priority_override:
      max_strength: 0.55
      power: 0.20
      strength_endurance: 0.15
      mobility: 0.10
  - phase: peak
    weeks: 4
    focus: >
      Intensity block. Drop volume, increase intensity (85–97% 1RM).
      Work to near-maximal singles and doubles. EMOM strength waves,
      wave loading (3-2-1). Conditioning ceases entirely. Prioritize
      sleep and recovery. PR attempts in final week.
    priority_override:
      max_strength: 0.70
      power: 0.20
      mobility: 0.10
      strength_endurance: 0.00
  - phase: deload
    weeks: 1
    focus: >
      Full deload. Back off to 60–70% for movement pattern rehearsal.
      No new strength stimulus. Active recovery, joint prep, light
      movement. Assess PRs. Plan next cycle or pivot to concurrent program.
    priority_override:
      mobility: 0.50
      max_strength: 0.30
      power: 0.10
      strength_endurance: 0.10

minimum_prerequisites:
  back_squat_bw_pct: 0.85
  deadlift_bw_pct: 1.25
  strict_press_bw_pct: 0.55

incompatible_with:
  - goal_id: ultra_endurance
    reason: >
      High aerobic volume suppresses maximal strength adaptation through
      molecular interference (AMPK-mTOR pathway conflict) and accumulated
      fatigue. Cannot optimize both simultaneously.
  - goal_id: alpine_climbing
    reason: >
      Alpine prep requires aerobic volume that creates recovery and
      interference conflict with the heavy barbell training required
      for max strength development.

framework_selection:
  default_framework: block_periodization
  alternatives:
    - framework_id: linear_progression
      condition: training_history == novice or back_squat_bw_pct < 1.25
    - framework_id: rpe_autoregulation
      condition: training_history == advanced

notes: >
  Starting Strength governs the base phase: linear progression, compound
  barbell lifts, SRA cycle. Gym Jones block periodization drives the
  volume-to-intensity arc. Marcus Filly RPE autoregulation prevents
  grinding sessions that increase injury risk without stimulus. Conditioning
  is intentionally minimized — sufficient to maintain cardiac health
  (1×/week Zone 2) but not enough to create meaningful interference.
  This profile is intended as a finite block (13 weeks rolling) before
  the athlete returns to a concurrent or GPP program.

expectations:
  min_weeks: 11
  ideal_weeks: 13
  min_days_per_week: 3
  ideal_days_per_week: 4
  min_session_minutes: 45
  ideal_session_minutes: 75
  supports_split_days: false
  notes: >
    Strength sessions require adequate warm-up and recovery between sets —
    60–75 min is the effective range. More days add volume but require careful
    fatigue management. Secondary sessions add little value for pure strength goals.
