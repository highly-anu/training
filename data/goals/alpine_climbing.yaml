id: alpine_climbing
name: Alpine Climbing Performance
description: >
  For mountain athletes preparing for technical or high-altitude alpine objectives.
  Targets a strong aerobic engine, load-bearing durability, and sufficient strength
  to move efficiently under a pack in steep terrain over multi-day efforts.

event_date: null

priorities:
  aerobic_base: 0.50
  durability: 0.20
  max_strength: 0.15
  mobility: 0.10
  power: 0.05

primary_sources:
  - uphill_athlete
  - horsemen_gpp
  - kelly_starrett

phase_sequence:
  - phase: base
    weeks: 8
    focus: >
      Build aerobic base (Zone 1–2 volume), establish structural strength
      (3×5 squat/deadlift/press), introduce daily mobility practice and
      joint prep. Low intensity, high frequency aerobic work.
  - phase: build
    weeks: 6
    focus: >
      Increase aerobic volume and vertical gain. Add pack weight to rucks.
      Introduce threshold intervals (1–2×/week). Strength transitions from
      linear load to moderate volume sets. Begin movement complexity on terrain.
    priority_override:
      aerobic_base: 0.45
      durability: 0.25
      max_strength: 0.15
      mobility: 0.10
      power: 0.05
  - phase: peak
    weeks: 4
    focus: >
      Shift toward sport-specific simulation: long rucks with max pack weight,
      sustained threshold and lactate intervals, reduce strength volume to
      maintenance. Mental durability work. Sharpening power-to-weight.
    priority_override:
      aerobic_base: 0.40
      durability: 0.30
      power: 0.15
      mobility: 0.10
      max_strength: 0.05
  - phase: taper
    weeks: 2
    focus: >
      Reduce volume 40–50%, maintain intensity. Short aerobic sessions,
      mobility, movement quality. No new strength stimulus. Full recovery
      entering objective.
    priority_override:
      aerobic_base: 0.40
      mobility: 0.30
      durability: 0.20
      max_strength: 0.05
      power: 0.05

minimum_prerequisites:
  run_5km_time_min: 35
  back_squat_bw_pct: 0.85
  pull_up_reps: 3

incompatible_with:
  - goal_id: max_strength_focus
    reason: >
      High-volume barbell strength work creates CNS and recovery interference
      with the aerobic volume required for alpine prep. Concurrent pursuit
      degrades both adaptations.

framework_selection:
  default_framework: polarized_80_20
  alternatives:
    - framework_id: concurrent_training
      condition: days_per_week <= 3
    - framework_id: block_periodization
      condition: event_date is not null and weeks_to_event >= 16

notes: >
  Uphill Athlete's polarized model is the primary driver: 80% Zone 1–2,
  20% above aerobic threshold. Strength work from Horsemen/SS provides
  the structural base for load-bearing. Starrett mobility protocols protect
  hip, ankle, and thoracic integrity under extended pack loads. Vertical
  gain and time-on-feet trump gym PRs as the relevant performance metric.

expectations:
  min_weeks: 14
  ideal_weeks: 20
  min_days_per_week: 3
  ideal_days_per_week: 5
  min_session_minutes: 45
  ideal_session_minutes: 75
  ideal_long_session_minutes: 210
  supports_split_days: true
  notes: >
    Weekend long efforts (3–5h hikes or ruck marches) are non-negotiable for
    alpine prep. Weekday sessions are shorter strength and aerobic work (60–90 min).
    Secondary sessions (joint prep, foot/ankle work) pair well with primary days.
