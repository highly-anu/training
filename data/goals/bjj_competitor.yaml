id: bjj_competitor
name: BJJ Competitor
description: >
  For Brazilian Jiu-Jitsu competitors preparing for a tournament or sharpening
  competitive fitness. Prioritizes mat-time conditioning (isometric endurance,
  hip explosiveness, grip endurance), complementary strength, and the joint
  health required to sustain heavy training loads.

event_date: null

priorities:
  combat_sport: 0.30
  strength_endurance: 0.20
  mobility: 0.20
  max_strength: 0.15
  anaerobic_intervals: 0.15

primary_sources:
  - bjj
  - ido_portal
  - gym_jones
  - kelly_starrett
  - marcus_filly

phase_sequence:
  - phase: base
    weeks: 6
    focus: >
      Build aerobic and structural foundation. 3–4 BJJ sessions/week (drilling
      and positional sparring, no full intensity rounds). Barbell strength 2×/week
      (squat, deadlift, press). Dedicated mobility 20–30 min daily for hips,
      shoulders, and neck. Grip endurance work begins (dead hangs, towel pull-ups).
  - phase: build
    weeks: 6
    focus: >
      Increase conditioning specificity. Hard rolling 3–4×/week. Introduce
      anaerobic intervals (Tabata, sprint intervals) 1–2×/week to match match
      intensity. Strength endurance circuits (KB complexes, bodyweight). Hip
      explosiveness training (broad jumps, med ball, Litvinov). Grip density work.
    priority_override:
      combat_sport: 0.35
      strength_endurance: 0.25
      anaerobic_intervals: 0.20
      mobility: 0.15
      max_strength: 0.05
  - phase: peak
    weeks: 3
    focus: >
      Tournament-specific sharpening. Hard rounds at match pace 4–5×/week.
      Anaerobic intervals at match duration (5–6 min rounds). Drop strength
      volume to maintenance. Increase mobility and recovery work. Sharpen
      takedown and guard retention conditioning.
    priority_override:
      combat_sport: 0.45
      anaerobic_intervals: 0.25
      mobility: 0.20
      strength_endurance: 0.10
      max_strength: 0.00
  - phase: taper
    weeks: 1
    focus: >
      Reduce volume 50%+. Light drilling only, no hard rolling. Full mobility
      session. Rest, recovery, mental preparation. Weight cut management if applicable.
    priority_override:
      mobility: 0.50
      combat_sport: 0.30
      strength_endurance: 0.20
      max_strength: 0.00
      anaerobic_intervals: 0.00

minimum_prerequisites:
  pull_up_reps: 5
  run_1mile_min: 10

incompatible_with: []

framework_selection:
  default_framework: concurrent_training
  alternatives:
    - framework_id: block_periodization
      condition: event_date is not null and weeks_to_event >= 12
    - framework_id: rpe_autoregulation
      condition: bjj_sessions_per_week >= 5

notes: >
  Mat time is non-transferable; rolling has no substitute (BJJ philosophy).
  Gym Jones block structure governs off-mat conditioning phases.
  Kelly Starrett protocols govern shoulder, knee, and neck maintenance —
  critical given the compression and torque demands of grappling.
  Marcus Filly RPE autoregulation prevents overtraining when BJJ volume is high.
  Joint health for shoulders, knees, and neck must be actively maintained
  throughout; any pain flags redirect training immediately.

expectations:
  min_weeks: 12
  ideal_weeks: 16
  min_days_per_week: 3
  ideal_days_per_week: 5
  min_session_minutes: 45
  ideal_session_minutes: 60
  supports_split_days: true
  notes: >
    BJJ-specific conditioning requires moderate weekly frequency alongside mat
    training. Short sessions (45 min) are viable. Secondary mobility sessions
    are highly recommended given the shoulder, neck, and knee stress of grappling.
