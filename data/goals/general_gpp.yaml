id: general_gpp
name: General Physical Preparedness
description: >
  For athletes who want broad, balanced fitness with no single domain weakness.
  Targets a rolling program that develops strength, aerobic capacity, work
  capacity, and movement quality concurrently — the foundation for any
  future specialization or sport-specific pivot.

event_date: null

priorities:
  max_strength: 0.20
  aerobic_base: 0.20
  strength_endurance: 0.20
  durability: 0.15
  mobility: 0.15
  power: 0.10

primary_sources:
  - horsemen_gpp
  - crossfit
  - wildman_kettlebell
  - marcus_filly
  - kelly_starrett

phase_sequence:
  - phase: base
    weeks: 8
    focus: >
      Establish all-domain foundation simultaneously. Linear barbell progression
      3×/week (squat, press, deadlift). Zone 2 aerobic 3×/week. KB ballistic
      technique (swing, clean, snatch). Daily joint prep circuit. No intensity
      work until movement quality is established.
  - phase: build
    weeks: 8
    focus: >
      Increase load, volume, and conditioning density. Transition to 5×5 strength.
      Add threshold intervals 1×/week. Introduce GPP circuits (sandbag, loaded
      carries, bodyweight) 2×/week. KB pentathlon volume begins. EMOM density work.
    priority_override:
      strength_endurance: 0.25
      max_strength: 0.20
      aerobic_base: 0.20
      durability: 0.20
      power: 0.10
      mobility: 0.05
  - phase: deload
    weeks: 1
    focus: >
      Full deload. All volumes cut 50%. Movement quality focus only. No max
      efforts. Active recovery, joint prep, light Zone 2. Mental reset.
    priority_override:
      mobility: 0.50
      aerobic_base: 0.30
      durability: 0.10
      max_strength: 0.05
      strength_endurance: 0.05
  - phase: build
    weeks: 8
    focus: >
      Second build cycle at higher baseline. Strength moves to wave loading
      and heavy/light/medium structure. Conditioning increases to mixed modal
      AMRAPs and named benchmarks. Introduce rucking for durability. Power
      work via Olympic lifts or KB ballistics.
    priority_override:
      max_strength: 0.20
      strength_endurance: 0.25
      aerobic_base: 0.15
      durability: 0.20
      power: 0.15
      mobility: 0.05

minimum_prerequisites: {}

incompatible_with: []

framework_selection:
  default_framework: concurrent_training
  alternatives:
    - framework_id: gpp_circuits
      condition: days_per_week <= 3
    - framework_id: rpe_autoregulation
      condition: training_history == novice

notes: >
  General GPP is the entry point for most athletes and the default program
  for those without a specific event or sport. Horsemen's philosophy of
  elite fitness over a broad base governs selection. CrossFit's mixed modal
  approach fills conditioning slots. Wildman KB ballistics cover power and
  conditioning simultaneously. Marcus Filly RPE autoregulation prevents
  cumulative overtraining in a concurrent program. Rolling structure means
  no fixed event date — program repeats build→deload→build indefinitely
  until the athlete pivots to a specialized goal profile.

expectations:
  min_weeks: 17
  ideal_weeks: 25
  min_days_per_week: 3
  ideal_days_per_week: 5
  min_session_minutes: 45
  ideal_session_minutes: 60
  supports_split_days: true
  notes: >
    Concurrent training across all domains requires moderate sessions across
    most days. Shorter sessions are viable — the program adapts by dropping
    lower-priority modalities. Secondary mobility sessions add significant value.
